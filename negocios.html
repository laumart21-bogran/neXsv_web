<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NeXsv - Negocios</title>

<style>

/* BASE */
html{
  font-size:16px;
}

body{
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
  color:#333;
}

/* HEADER */
header{
  background:white;
  padding:12px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #eee;
}

header img{
  height:70px;
}

nav a{
  color:#2f4ea2;
  margin-left:20px;
  text-decoration:none;
  font-size:0.95rem;
}

.nav-btn{
  background:#66b34e;
  padding:10px 16px;
  border-radius:10px;
  color:white;
}

/* HERO */
.hero{
  background:url('cover-negocios.jpg') center/cover no-repeat;
  height:280px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
}

.hero h1{
  position:relative;
  z-index:2;
  font-size:2.3rem;
}

/* MAIN */
.main{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

/* BUSCADOR */
#buscador{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:20px;
  font-size:1rem;
}

/* CATEGORIAS */
.categorias{
  margin-bottom:25px;
}

.categorias button{
  margin:5px;
  padding:10px 18px;
  border:none;
  border-radius:30px;
  background:white;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:0.2s;
}

.categorias button:hover{
  background:#66b34e;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:22px;
}

/* CARD */
.card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  transition:0.25s;
}

.card:hover{
  transform:translateY(-6px);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content{
  padding:18px;
}

.card h3{
  margin-top:0;
  margin-bottom:10px;
  font-size:1.2rem;
}

.card p{
  color:#666;
  font-size:0.92rem;
  line-height:1.5;
}

/* BOTONES */
.botones{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.btn{
  flex:1;
  text-align:center;
  padding:11px;
  border-radius:10px;
  text-decoration:none;
  color:white;
  border:none;
  cursor:pointer;
  font-size:0.92rem;
}

.btn-w{
  background:#66b34e;
}

.btn-v{
  background:#ff914d;
}

.btn-map{
  display:block;
  margin-top:12px;
  text-align:center;
  background:#f1f5f9;
  color:#333;
  padding:10px;
  border-radius:10px;
  text-decoration:none;
  font-size:0.9rem;
  transition:0.2s;
}

.btn-map:hover{
  background:#66b34e;
  color:white;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  justify-content:center;
  align-items:center;
  z-index:999;
  padding:20px;
}

.modal-content{
  background:white;
  width:100%;
  max-width:520px;
  border-radius:20px;
  padding:20px;
  animation:fadeIn 0.25s ease;
}

@keyframes fadeIn{
  from{
    transform:translateY(20px);
    opacity:0;
  }
  to{
    transform:translateY(0);
    opacity:1;
  }
}

.carousel{
  display:flex;
  overflow-x:auto;
  gap:10px;
  scroll-snap-type:x mandatory;
  margin-bottom:15px;
}

.carousel img{
  min-width:100%;
  height:260px;
  object-fit:cover;
  border-radius:14px;
  scroll-snap-align:center;
}

.modal-content h2{
  margin-top:0;
}

.modal-content p{
  color:#555;
  line-height:1.6;
}

.modal-buttons{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.modal-buttons a{
  flex:1;
}

/* FOOTER */
footer{
  margin-top:50px;
  background:white;
  padding:25px;
  text-align:center;
  color:#666;
  font-size:0.9rem;
}

.footer-line{
  width:100%;
  height:1px;
  background:#ddd;
  margin-bottom:15px;
}

footer a{
  color:#2f4ea2;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){

header{
  flex-direction:column;
  gap:10px;
  padding:15px;
}

nav{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

nav a{
  margin:5px;
}

.hero{
  height:220px;
}

.hero h1{
  font-size:1.7rem;
}

.card img{
  height:200px;
}

}

</style>
</head>

<body>

<header>

<a href="index.html">
<img src="logo.png">
</a>

<nav>
<a href="index.html">Inicio</a>
<a href="como.html">Cómo funciona</a>
<a href="beneficios.html">Beneficios</a>
<a href="negocios.html">Negocios</a>
<a href="blog.html">Blog</a>

<a class="nav-btn"
href="https://docs.google.com/forms/d/e/1FAIpQLSeDIKEEkzAxlmfRmTNLVBQoiiNxrbpbRcqk3C3iL73QCDMhyw/viewform"
target="_blank">
Solicitar acceso
</a>

</nav>

</header>

<section class="hero">
<h1>Negocios disponibles</h1>
</section>

<section class="main">

<input
type="text"
id="buscador"
placeholder="Buscar negocio..."
onkeyup="buscar()"
>

<div class="categorias">
<button onclick="filtrar('Todos')">Todos</button>
<button onclick="filtrar('Servicios')">Servicios</button>
<button onclick="filtrar('Comida')">Comida</button>
<button onclick="filtrar('Belleza')">Belleza</button>
<button onclick="filtrar('Legal')">Legal</button>
</div>

<div class="grid" id="contenedor"></div>

</section>

<!-- MODAL -->

<div id="modal">

<div class="modal-content">

<div class="carousel" id="carousel"></div>

<h2 id="m_nombre"></h2>

<p id="m_desc"></p>

<div class="modal-buttons">

<a
id="m_whatsapp"
target="_blank"
class="btn btn-w">
WhatsApp
</a>

<a
id="m_mapa"
target="_blank"
class="btn btn-v">
📍 Cómo llegar
</a>

</div>

<br>

<button
onclick="cerrarModal()"
class="btn-map"
style="border:none;width:100%;">
Cerrar
</button>

</div>

</div>

<footer>
<div class="footer-line"></div>

© 2026 NeXsv |
<a href="terminos.html">Términos y condiciones</a>

</footer>

<script>

const url = "https://script.google.com/macros/s/AKfycbz2iBCu10uZ_BZMkZUqDrWSTQdHkNSqWTpFxedVMfepEmbb43Eat5U5FQTEE_I8Eko/exec";

const ANALYTICS = url;

let dataGlobal = [];
let DATA_MODAL = [];

fetch(url)
.then(res => res.json())
.then(data => {

console.log(data);

dataGlobal = data;

renderizar(data);

});

function convertirDrive(link){

if(link && link.includes("drive.google.com")){

let match = link.match(/\/d\/([a-zA-Z0-9_-]+)/);

if(!match){
match = link.match(/id=([a-zA-Z0-9_-]+)/);
}

if(match){
return `https://drive.google.com/uc?export=view&id=${match[1]}`;
}

}

return link;

}

function renderizar(data){

const contenedor = document.getElementById("contenedor");

DATA_MODAL = [];

const html = data.map(n => {

const k = Object.keys(n).reduce((a,c)=>{
a[c.trim()] = n[c];
return a;
},{});

const nombre =
k["Nombre de tu negocio"] ||
"Negocio";

const descripcion =
k["Descripcion_final"] ||
k["Describe tu negocio"] ||
"";

const telefono =
(k["WhatsApp del negocio"] || "").replace("+","");

const zona =
k["¿En qué zona resides?"] ||
"";

const ubicacionLink =
k["Link de ubicación del Negocio (Link de Google Maps)"] ||
k["Ubicación del Negocio (Link de Google Maps)"] ||
k["Google Maps"] ||
k["Ubicación"] ||
k["Ubicacion"] ||
k["Maps"] ||
"";

let img1 =
convertirDrive(
k["Link de imagen resp"] ||
k["Imagen_final"] ||
""
);

let img2 =
convertirDrive(
k["Imagen2"] || ""
);

let img3 =
convertirDrive(
k["Imagen3"] || ""
);

if(!img1){
img1 = "https://via.placeholder.com/400x300";
}

const images = [img1,img2,img3].filter(i=>i);

DATA_MODAL.push({
nombre,
descripcion,
zona,
images,
telefono,
mapa:ubicacionLink
});

const index = DATA_MODAL.length - 1;

return `

<div class="card">

<img src="${img1}" loading="lazy">

<div class="card-content">

<h3>${nombre}</h3>

<p>${descripcion.substring(0,90)}...</p>

<div class="botones">

<a
href="#"
onclick="event.stopPropagation(); irWhatsApp('${nombre}','${telefono}')"
class="btn btn-w">
WhatsApp
</a>

<button
onclick="event.stopPropagation(); abrirModal(DATA_MODAL[${index}])"
class="btn btn-v">
Ver más
</button>

</div>

<a
href="${ubicacionLink}"
target="_blank"
class="btn-map">
📍 Cómo llegar
</a>

</div>

</div>

`;

}).join("");

contenedor.innerHTML = html;

}

function abrirModal(data){

fetch(ANALYTICS,{
method:"POST",
body:JSON.stringify({
tipo:"vista",
negocio:data.nombre
})
});

document.getElementById("modal").style.display = "flex";

document.getElementById("m_nombre").innerText = data.nombre;

document.getElementById("m_desc").innerText = data.descripcion;

document.getElementById("carousel").innerHTML =
data.images.map(i => `<img src="${i}">`).join("");

document.getElementById("m_whatsapp").href =
"https://wa.me/" + data.telefono;

document.getElementById("m_mapa").href =
data.mapa || "#";

}

function irWhatsApp(nombre,telefono){

fetch(ANALYTICS,{
method:"POST",
body:JSON.stringify({
tipo:"whatsapp",
negocio:nombre
})
});

window.open(
"https://wa.me/" + telefono,
"_blank"
);

}

function cerrarModal(){

document.getElementById("modal").style.display = "none";

}

function buscar(){

const texto =
document.getElementById("buscador")
.value
.toLowerCase();

const filtrados =
dataGlobal.filter(n => {

const k = Object.keys(n).reduce((a,c)=>{
a[c.trim()] = n[c];
return a;
},{});

return (
k["Nombre de tu negocio"] || ""
)
.toLowerCase()
.includes(texto);

});

renderizar(filtrados);

}

function filtrar(cat){

if(cat === "Todos"){
renderizar(dataGlobal);
return;
}

const filtrados =
dataGlobal.filter(n => {

const k = Object.keys(n).reduce((a,c)=>{
a[c.trim()] = n[c];
return a;
},{});

return (
k["Categoría de tu negocio"] || ""
)
.toLowerCase() === cat.toLowerCase();

});

renderizar(filtrados);

}

</script>

</body>
</html>
