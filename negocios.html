<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeXsv - Negocios</title>

<!-- TIPOGRAFÍA -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================================
RESET
======================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

:root{
--primary:#1657B8;
--secondary:#19C2C6;
--accent:#F7C531;
--success:#74D67F;
--bg:#F5F7FB;
--text:#1D2A3A;
--white:#ffffff;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* ========================================
HEADER
======================================== */

header{
position:sticky;
top:0;
z-index:999;

background:rgba(255,255,255,.78);
backdrop-filter:blur(14px);

padding:14px 50px;

display:flex;
justify-content:space-between;
align-items:center;

border-bottom:1px solid rgba(255,255,255,.5);
}

header img{
height:72px;
transition:.3s;
}

header img:hover{
transform:scale(1.03);
}

nav{
display:flex;
align-items:center;
flex-wrap:wrap;
gap:18px;
}

nav a{
text-decoration:none;
color:var(--primary);
font-weight:600;
transition:.3s;
}

nav a:hover{
color:var(--secondary);
}

.nav-btn{
background:linear-gradient(
135deg,
var(--accent),
#ffd95e
);

padding:12px 18px;

border-radius:16px;

color:#1D2A3A;

font-weight:700;

box-shadow:
0 12px 30px rgba(247,197,49,.28);
}

.nav-btn:hover{
transform:translateY(-3px);
color:#1D2A3A;
}

/* ========================================
HERO
======================================== */

.hero{
background:
linear-gradient(
rgba(9,28,61,.78),
rgba(9,28,61,.82)
),
url('cover-negocios.jpg') center/cover no-repeat;

height:340px;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

position:relative;
overflow:hidden;
}

.hero::before{
content:"";
position:absolute;

width:450px;
height:450px;

background:rgba(25,194,198,.18);

filter:blur(120px);

border-radius:50%;

top:-120px;
right:-100px;
}

.hero::after{
content:"";
position:absolute;

width:320px;
height:320px;

background:rgba(247,197,49,.12);

filter:blur(110px);

border-radius:50%;

bottom:-100px;
left:-70px;
}

.hero-content{
position:relative;
z-index:2;
max-width:800px;
padding:20px;
}

.hero h1{
font-size:60px;
font-weight:800;
line-height:1.05;
letter-spacing:-2px;

color:white;

margin-bottom:18px;
}

.hero p{
font-size:20px;
line-height:1.8;

color:rgba(255,255,255,.9);
}

/* ========================================
MAIN
======================================== */

.main{
max-width:1300px;
margin:auto;
padding:70px 20px;
}

/* ========================================
BUSCADOR
======================================== */

.search-box{
position:relative;
margin-bottom:30px;
}

#buscador{
width:100%;

padding:20px 24px;

border:none;
outline:none;

border-radius:22px;

background:rgba(255,255,255,.82);
backdrop-filter:blur(12px);

font-size:16px;
font-family:'Inter',sans-serif;

box-shadow:
0 10px 30px rgba(0,0,0,.06);

transition:.3s;
}

#buscador:focus{
box-shadow:
0 0 0 4px rgba(25,194,198,.15);
}

/* ========================================
CATEGORIAS
======================================== */

.categorias{
display:flex;
flex-wrap:wrap;
gap:14px;
margin-bottom:40px;
}

.categorias button{
border:none;
cursor:pointer;

padding:12px 22px;

border-radius:999px;

background:rgba(255,255,255,.82);

backdrop-filter:blur(10px);

font-family:'Inter',sans-serif;
font-weight:700;

color:var(--primary);

transition:.3s;

box-shadow:
0 8px 20px rgba(0,0,0,.05);
}

.categorias button:hover{
background:linear-gradient(
135deg,
var(--secondary),
var(--primary)
);

color:white;

transform:translateY(-3px);
}

/* ========================================
GRID
======================================== */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:28px;
}

/* ========================================
CARD
======================================== */

.card{
background:rgba(255,255,255,.82);
backdrop-filter:blur(14px);

border-radius:28px;

overflow:hidden;

position:relative;

transition:.35s;

box-shadow:
0 12px 35px rgba(0,0,0,.07);
}

.card:hover{
transform:translateY(-10px);

box-shadow:
0 24px 55px rgba(0,0,0,.12);
}

.card-image{
position:relative;
overflow:hidden;
}

.card img{
width:100%;
height:240px;
object-fit:cover;

transition:.5s;
}

.card:hover img{
transform:scale(1.05);
}

.badge{
position:absolute;
top:16px;
left:16px;

background:rgba(255,255,255,.88);
backdrop-filter:blur(10px);

padding:8px 14px;

border-radius:999px;

font-size:12px;
font-weight:800;

color:var(--primary);
}

.card-content{
padding:24px;
}

.card h3{
font-size:24px;
font-weight:800;
margin-bottom:14px;
color:var(--primary);
}

.card p{
font-size:15px;
line-height:1.8;
color:#5d6677;
}

/* ========================================
BOTONES
======================================== */

.botones{
display:flex;
gap:12px;
margin-top:22px;
flex-wrap:wrap;
}

.btn{
flex:1;

text-align:center;

padding:14px;

border:none;

border-radius:14px;

text-decoration:none;

font-weight:700;
font-family:'Inter',sans-serif;

cursor:pointer;

transition:.3s;
}

.btn-w{
background:linear-gradient(
135deg,
var(--success),
#5acb68
);

color:white;
}

.btn-v{
background:linear-gradient(
135deg,
var(--secondary),
var(--primary)
);

color:white;
}

.btn-share{
background:linear-gradient(
135deg,
#F7C531,
#ffd95e
);

color:#1D2A3A;
}

.btn:hover{
transform:translateY(-3px);
}

.btn-map{
display:block;

margin-top:14px;

padding:13px;

text-align:center;

border-radius:14px;

text-decoration:none;

font-weight:700;

background:#eef3ff;
color:var(--primary);

transition:.3s;
}

.btn-map:hover{
background:var(--primary);
color:white;
}

/* ========================================
FOOTER
======================================== */

footer{
margin-top:70px;

background:white;

padding:40px 20px;

text-align:center;

color:#6b7280;
font-size:14px;
}

.footer-line{
width:100%;
height:1px;
background:#e5e7eb;
margin-bottom:20px;
}

footer a{
text-decoration:none;
color:var(--primary);
font-weight:700;
}

/* ========================================
RESPONSIVE
======================================== */

@media(max-width:900px){

header{
padding:15px 18px;
flex-direction:column;
gap:14px;
}

header img{
height:60px;
}

nav{
justify-content:center;
gap:10px;
}

nav a{
font-size:14px;
}

.nav-btn{
width:100%;
text-align:center;
padding:14px;
margin-top:5px;
}

.hero{
height:auto;
min-height:300px;
padding:50px 20px;
}

.hero h1{
font-size:38px;
line-height:1.15;
letter-spacing:-1px;
}

.hero p{
font-size:17px;
line-height:1.7;
}

.main{
padding:40px 16px;
}

#buscador{
padding:18px 20px;
font-size:15px;
border-radius:18px;
}

.categorias{
gap:10px;
overflow-x:auto;
flex-wrap:nowrap;
padding-bottom:6px;

scrollbar-width:none;
}

.categorias::-webkit-scrollbar{
display:none;
}

.categorias button{
white-space:nowrap;
padding:12px 18px;
font-size:14px;
flex-shrink:0;
}

.grid{
grid-template-columns:1fr;
gap:22px;
}

.card{
border-radius:24px;
}

.card img{
height:220px;
}

.card-content{
padding:20px;
}

.card h3{
font-size:22px;
}

.card p{
font-size:14px;
line-height:1.7;
}

.botones{
flex-direction:column;
}

.btn{
width:100%;
padding:15px;
font-size:15px;
}

.btn-map{
padding:15px;
font-size:15px;
}

footer{
padding:35px 20px;
font-size:13px;
}

}

@media(max-width:480px){

.hero h1{
font-size:32px;
}

.hero p{
font-size:16px;
}

.card img{
height:200px;
}

}

</style>
</head>

<body>

<header>

<a href="index.html">
<img src="logo.png" alt="NeXsv">
</a>

<nav>

<a href="index.html">
Inicio
</a>

<a href="como.html">
Cómo funciona
</a>

<a href="beneficios.html">
Beneficios
</a>

<a href="negocios.html">
Negocios
</a>

<a href="blog.html">
Blog
</a>

<a
class="nav-btn"
href="https://docs.google.com/forms/d/e/1FAIpQLSeDIKEEkzAxlmfRmTNLVBQoiiNxrbpbRcqk3C3iL73QCDMhyw/viewform"
target="_blank">

Solicitar acceso

</a>

</nav>

</header>

<section class="hero">

<div class="hero-content">

<h1>
Explora negocios dentro de tu comunidad
</h1>

<p>
Conecta con emprendedores, servicios y marcas que forman parte de la red privada NeXsv.
</p>

</div>

</section>

<section class="main">

<div class="search-box">

<input
type="text"
id="buscador"
placeholder="Buscar negocio..."
onkeyup="buscar()">

</div>

<div class="categorias">

<button onclick="filtrar('Todos')">
Todos
</button>

<button onclick="filtrar('Servicios')">
Servicios
</button>

<button onclick="filtrar('Comida')">
Comida
</button>

<button onclick="filtrar('Belleza')">
Belleza
</button>

<button onclick="filtrar('Legal')">
Legal
</button>

</div>

<div class="grid" id="contenedor"></div>

</section>

<footer>

<div class="footer-line"></div>

© 2026 NeXsv |
<a href="terminos.html">
Términos y condiciones
</a>

</footer>

<script>

const url =
"https://script.google.com/macros/s/AKfycbz2iBCu10uZ_BZMkZUqDrWSTQdHkNSqWTpFxedVMfepEmbb43Eat5U5FQTEE_I8Eko/exec";

function crearSlug(texto){

return texto
.toString()
.trim()
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "")
.replace(/[^\w\s-]/g, "")
.replace(/\s+/g, "-")
.replace(/-+/g, "-");

}

/* ========================================
FETCH
======================================== */

fetch(url)

.then(res => res.json())

.then(data => {

console.log(data);

dataGlobal = data;

renderizar(data);

});

/* ========================================
DRIVE
======================================== */

function convertirDrive(link){

if(link && link.includes("drive.google.com")){

let match =
link.match(/\/d\/([a-zA-Z0-9_-]+)/);

if(!match){

match =
link.match(/id=([a-zA-Z0-9_-]+)/);

}

if(match){

return `https://drive.google.com/uc?export=view&id=${match[1]}`;

}

}

return link;

}

/* ========================================
SLUG
======================================== */

function crearSlug(texto){

return texto
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "")
.replace(/[^a-z0-9\s-]/g, "")
.replace(/\s+/g, "-");

}

/* ========================================
RENDER
======================================== */

function renderizar(data){

const contenedor =
document.getElementById("contenedor");

const html = data.map(n => {

const k =
Object.keys(n).reduce((a,c)=>{

a[c.trim()] = n[c];

return a;

},{});

const nombre =
k["Nombre de tu negocio"] ||
"Negocio";

const descripcion =
k["Descripcion_final"] ||
k["Describe tu negocio"] ||
"";

const telefono =
(k["WhatsApp del negocio"] || "")
.replace("+","");

const categoria =
k["Categoría de tu negocio"] ||
"Comunidad";

const ubicacionLink =
k["Link de ubicación del Negocio (Link de Google Maps)"] ||
k["Ubicación del Negocio (Link de Google Maps)"] ||
"#";

let img1 =
convertirDrive(
k["Link de imagen resp"] ||
k["Imagen_final"] ||
""
);

if(!img1){

img1 =
"https://via.placeholder.com/600x400";

}

const slug =
crearSlug(nombre);

return `

<div class="card">

<div class="card-image">

<img src="${img1}" loading="lazy">

<div class="badge">
${categoria}
</div>

</div>

<div class="card-content">

<h3>
${nombre}
</h3>

<p>
${descripcion.substring(0,95)}...
</p>

<div class="botones">

<a
href="#"
onclick="event.preventDefault(); irWhatsApp('${nombre}','${telefono}')"
class="btn btn-w">

WhatsApp

</a>

<a
href="negocio.html?id=${slug}"
class="btn btn-v">

Ver más

</a>

<button
onclick="compartirNegocio('${slug}','${nombre.replace(/'/g,"\\'")}')"
class="btn btn-share">

Compartir

</button>

</div>

<a
href="${ubicacionLink}"
target="_blank"
class="btn-map">

📍 Cómo llegar

</a>

</div>

</div>

`;

}).join("");

contenedor.innerHTML = html;

}

/* ========================================
COMPARTIR
======================================== */

function compartirNegocio(id,nombre){

const enlace =
`https://laumart21-bogran.github.io/neXsv_web/negocio.html?id=${id}`;

const mensaje =
`Descubre este negocio recomendado dentro de NeXsv.

${nombre}

Conecta con negocios y emprendedores confiables dentro de una comunidad privada.

${enlace}`;

const link =
"https://wa.me/?text=" +
encodeURIComponent(mensaje);

window.open(link,"_blank");

}

/* ========================================
WHATSAPP
======================================== */

function irWhatsApp(nombre,telefono){

fetch(ANALYTICS,{

method:"POST",

body:JSON.stringify({

tipo:"whatsapp",
negocio:nombre

})

});

window.open(
"https://wa.me/" + telefono,
"_blank"
);

}

/* ========================================
BUSCAR
======================================== */

function buscar(){

const texto =
document
.getElementById("buscador")
.value
.toLowerCase();

const filtrados =
dataGlobal.filter(n => {

const k =
Object.keys(n).reduce((a,c)=>{

a[c.trim()] = n[c];

return a;

},{});

return (
k["Nombre de tu negocio"] || ""
)
.toLowerCase()
.includes(texto);

});

renderizar(filtrados);

}

/* ========================================
FILTRAR
======================================== */

function filtrar(cat){

if(cat === "Todos"){

renderizar(dataGlobal);

return;

}

const filtrados =
dataGlobal.filter(n => {

const k =
Object.keys(n).reduce((a,c)=>{

a[c.trim()] = n[c];

return a;

},{});

return (
k["Categoría de tu negocio"] || ""
)
.toLowerCase() === cat.toLowerCase();

});

renderizar(filtrados);

}

</script>

</body>
</html>
