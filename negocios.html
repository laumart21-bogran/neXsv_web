<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>neXsv - Negocios</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================================
RESET
======================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

:root{
--primary:#1657B8;
--secondary:#19C2C6;
--accent:#F7C531;
--success:#74D67F;
--bg:#F5F7FB;
--text:#1D2A3A;
--white:#ffffff;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

nav{
display:flex;
align-items:center;
flex-wrap:wrap;
gap:18px;
}

nav a{
text-decoration:none;
color:var(--primary);
font-weight:600;
transition:.3s;
}

nav a:hover{
color:var(--secondary);
}

.nav-btn{
background:linear-gradient(
135deg,
var(--accent),
#ffd95e
);

padding:12px 18px;

border-radius:16px;

color:#1D2A3A;

font-weight:700;

box-shadow:
0 12px 30px rgba(247,197,49,.28);
}

.nav-btn:hover{
transform:translateY(-3px);
color:#1D2A3A;
}

/* ========================================
HERO
======================================== */

.hero{
background:
linear-gradient(
rgba(9,28,61,.78),
rgba(9,28,61,.82)
),
url('cover-negocios.jpg') center/cover no-repeat;

height:340px;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

position:relative;
overflow:hidden;
}

.hero::before{
content:"";
position:absolute;

width:450px;
height:450px;

background:rgba(25,194,198,.18);

filter:blur(120px);

border-radius:50%;

top:-120px;
right:-100px;
}

.hero::after{
content:"";
position:absolute;

width:320px;
height:320px;

background:rgba(247,197,49,.12);

filter:blur(110px);

border-radius:50%;

bottom:-100px;
left:-70px;
}

.hero-content{
position:relative;
z-index:2;
max-width:800px;
padding:20px;
}

.hero h1{
font-size:60px;
font-weight:800;
line-height:1.05;
letter-spacing:-2px;

color:white;

margin-bottom:18px;
}

.hero p{
font-size:20px;
line-height:1.8;

color:rgba(255,255,255,.9);
}

/* ========================================
MAIN
======================================== */

.main{
max-width:1300px;
margin:auto;
padding:70px 20px;
}

/* ========================================
BUSCADOR
======================================== */

.search-box{
position:relative;
margin-bottom:30px;
}

#buscador{
width:100%;

padding:20px 24px;

border:none;
outline:none;

border-radius:22px;

background:rgba(255,255,255,.82);
backdrop-filter:blur(12px);

font-size:16px;
font-family:'Inter',sans-serif;

box-shadow:
0 10px 30px rgba(0,0,0,.06);

transition:.3s;
}

#buscador:focus{
box-shadow:
0 0 0 4px rgba(25,194,198,.15);
}

/* ========================================
CATEGORIAS
======================================== */

.categorias{
display:flex;
flex-wrap:wrap;
gap:14px;
margin-bottom:40px;
}

.categorias button{
border:none;
cursor:pointer;

padding:12px 22px;

border-radius:999px;

background:rgba(255,255,255,.82);

backdrop-filter:blur(10px);

font-family:'Inter',sans-serif;
font-weight:700;

color:var(--primary);

transition:.3s;

box-shadow:
0 8px 20px rgba(0,0,0,.05);
}

.categorias button:hover{
background:linear-gradient(
135deg,
var(--secondary),
var(--primary)
);

color:white;

transform:translateY(-3px);
}

/* ========================================
GRID
======================================== */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:28px;
}

/* ========================================
CARD
======================================== */

.card{
background:rgba(255,255,255,.82);
backdrop-filter:blur(14px);

border-radius:28px;

overflow:hidden;

position:relative;

transition:.35s;

box-shadow:
0 12px 35px rgba(0,0,0,.07);
}

.card:hover{
transform:translateY(-10px);

box-shadow:
0 24px 55px rgba(0,0,0,.12);
}

.card-image{
position:relative;
overflow:hidden;
}

.card img{
width:100%;
height:240px;
object-fit:cover;

transition:.5s;
}

.card:hover img{
transform:scale(1.05);
}

.badge{
position:absolute;
top:16px;
left:16px;

background:rgba(255,255,255,.88);
backdrop-filter:blur(10px);

padding:8px 14px;

border-radius:999px;

font-size:12px;
font-weight:800;

color:var(--primary);
}

@media(max-width:768px){

.badge{

font-size:11px;

padding:6px 10px;

}

.featured-badge{

font-size:11px;

padding:6px 10px;

}

}

/*NUEVO*/

.featured-badge{

position:absolute;

top:16px;
right:16px;

background:linear-gradient(
135deg,
#F7C531,
#FFD95E
);

color:#1D2A3A;

padding:8px 14px;

border-radius:999px;

font-size:12px;
font-weight:800;

box-shadow:
0 10px 20px rgba(247,197,49,.35);

}

.card-content{
padding:24px;
}

.card h3{
font-size:24px;
font-weight:800;
margin-bottom:14px;
color:var(--primary);
}

.card p{
font-size:15px;
line-height:1.8;
color:#5d6677;
}

.verified-badge{

display:inline-flex;
align-items:center;

margin-bottom:12px;

padding:6px 12px;

border-radius:999px;

background:rgba(116,214,127,.15);

color:#2e7d32;

font-size:12px;
font-weight:700;

}
  
/* ========================================
BOTONES
======================================== */

.botones{
display:flex;
gap:12px;
margin-top:22px;
flex-wrap:wrap;
}

.btn{
flex:1;

text-align:center;

padding:14px;

border:none;

border-radius:14px;

text-decoration:none;

font-weight:700;
font-family:'Inter',sans-serif;

cursor:pointer;

transition:.3s;
}

.btn-w{
background:linear-gradient(
135deg,
var(--success),
#5acb68
);

color:white;
}

.btn-v{
background:linear-gradient(
135deg,
var(--secondary),
var(--primary)
);

color:white;
}

.btn-share{
background:linear-gradient(
135deg,
#F7C531,
#ffd95e
);

color:#1D2A3A;
}

.btn:hover{
transform:translateY(-3px);
}

.btn-map{
display:block;

margin-top:14px;

padding:13px;

text-align:center;

border-radius:14px;

text-decoration:none;

font-weight:700;

background:#eef3ff;
color:var(--primary);

transition:.3s;
}

.btn-map:hover{
background:var(--primary);
color:white;
}

/* ========================================
FOOTER
======================================== */

footer{
margin-top:70px;

background:white;

padding:40px 20px;

text-align:center;

color:#6b7280;
font-size:14px;
}

.footer-line{
width:100%;
height:1px;
background:#e5e7eb;
margin-bottom:20px;
}

footer a{
text-decoration:none;
color:var(--primary);
font-weight:700;
}

</style>
</head>

<body>

<script src="components/header.js"></script>
  
<section class="hero">

<div class="hero-content">

<h1>
Explora negocios dentro de tu comunidad
</h1>

<p>
Conecta con emprendedores, servicios y marcas que forman parte de la red privada neXsv.
</p>

</div>

</section>

<section class="main">

<div class="search-box">

<input
type="text"
id="buscador"
placeholder="Buscar negocio..."
onkeyup="buscar()">

</div>

<div class="categorias">

<button onclick="filtrar('Todos')">Todos</button>
<button onclick="filtrar('Servicios')">Servicios</button>
<button onclick="filtrar('Comida')">Comida</button>
<button onclick="filtrar('Belleza')">Belleza</button>
<button onclick="filtrar('Legal')">Legal</button>

</div>

<div class="grid" id="contenedor"></div>

</section>

<footer>

<div class="footer-line"></div>

© 2026 neXsv |
<a href="terminos.html">
Términos y condiciones
</a>

</footer>

<script>

const url =
"https://script.google.com/macros/s/AKfycbxzXObZPIXrJO3n4I1-zoDOx40ftAVYLKyl_4M_GrTq95RZfhcZ4iMrxY3e4bAmnMrN/exec";

const ANALYTICS = url;

let dataGlobal = [];

/* ========================================
SLUG
======================================== */

function crearSlug(texto){

return texto
.toString()
.trim()
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "")
.replace(/[^\w\s-]/g, "")
.replace(/\s+/g, "-")
.replace(/-+/g, "-")
.replace(/^-+|-+$/g, "");

}

/* ========================================
FETCH
======================================== */

fetch(url)

.then(res => res.json())

.then(data => {

dataGlobal = data.negocios || [];

renderizar(dataGlobal);

})

.catch(error => {

console.error(error);

document.getElementById("contenedor").innerHTML = `

<div style="
grid-column:1/-1;
text-align:center;
padding:60px;
font-weight:700;
">

Error cargando negocios

</div>

`;

});

/* ========================================
DRIVE
======================================== */

function convertirDrive(link){

if(link && link.includes("drive.google.com")){

let match =
link.match(/\/d\/([a-zA-Z0-9_-]+)/);

if(!match){

match =
link.match(/id=([a-zA-Z0-9_-]+)/);

}

if(match){

return `https://drive.google.com/uc?export=view&id=${match[1]}`;

}

}

return link;

}

/* ========================================
RENDER
======================================== */

function renderizar(data){

const contenedor =
document.getElementById("contenedor");

const html = data.map(n => {

const k =
Object.keys(n).reduce((a,c)=>{

a[c.trim()] = n[c];

return a;

},{});

const nombre =
k["Nombre de tu negocio"] ||
"Negocio";

const descripcion =
k["Descripcion_final"] ||
k["Describe tu negocio"] ||
"";

const telefono =
(k["WhatsApp del negocio"] || "")
.replace("+","")
.replace(/\s/g,"");

const categoria =
k["Categoría de tu negocio"] ||
"Comunidad";

const ubicacionLink =
k["Link de ubicación del Negocio (Link de Google Maps)"] ||
k["Ubicación del Negocio (Link de Google Maps)"] ||
"#";

let img1 =
convertirDrive(
k["Link de imagen resp"] ||
k["Imagen_final"] ||
""
);

if(!img1){

img1 =
"https://via.placeholder.com/600x400";

}

const slug =
crearSlug(nombre);

return `

<div class="card">

<div class="card-image">

<img src="${img1}" loading="lazy">

<div class="badge">
${categoria}
</div>

<div class="featured-badge">
⭐ Destacado
</div>

</div>

<div class="card-content">

<h3>
${nombre}
</h3>

<div class="verified-badge">
🟢 Miembro Verificado
</div>

<p>
${descripcion.substring(0,95)}...
</p>

<div class="botones">

<button
class="btn btn-w"
data-nombre="${nombre}"
data-telefono="${telefono}"
onclick="irWhatsApp(this.dataset.nombre,this.dataset.telefono)">

WhatsApp

</button>

<a
href="negocio.html?id=${slug}"
class="btn btn-v">

Ver más

</a>

<button
class="btn btn-share"
data-id="${slug}"
data-nombre="${nombre}"
onclick="compartirNegocio(this.dataset.id,this.dataset.nombre)">

Compartir

</button>

</div>

<a
href="${ubicacionLink}"
target="_blank"
class="btn-map">

📍 Cómo llegar

</a>

</div>

</div>

`;

}).join("");

contenedor.innerHTML = html;

}

/* ========================================
COMPARTIR
======================================== */

function compartirNegocio(id,nombre){

const enlace =
`https://laumart21-bogran.github.io/neXsv_web/negocio.html?id=${encodeURIComponent(id)}`;

const mensaje =
`Descubre este negocio recomendado dentro de neXsv.

${nombre}

Conecta con negocios y emprendedores confiables dentro de una comunidad privada.

${enlace}`;

const link =
"https://wa.me/?text=" +
encodeURIComponent(mensaje);

window.open(link,"_blank");

}

/* ========================================
WHATSAPP
======================================== */

function irWhatsApp(nombre,telefono){

fetch(ANALYTICS,{
method:"POST",
body:JSON.stringify({
tipo:"whatsapp",
negocio:nombre
})
})
.catch(error => console.log(error));

window.open(
"https://wa.me/" + telefono,
"_blank"
);

}

/* ========================================
BUSCAR
======================================== */

function buscar(){

const texto =
document
.getElementById("buscador")
.value
.toLowerCase();

const filtrados =
dataGlobal.filter(n => {

const k =
Object.keys(n).reduce((a,c)=>{

a[c.trim()] = n[c];

return a;

},{});

return (
k["Nombre de tu negocio"] || ""
)
.toLowerCase()
.includes(texto);

});

renderizar(filtrados);

}

/* ========================================
FILTRAR
======================================== */

function filtrar(cat){

if(cat === "Todos"){

renderizar(dataGlobal);

return;

}

const filtrados =
dataGlobal.filter(n => {

const k =
Object.keys(n).reduce((a,c)=>{

a[c.trim()] = n[c];

return a;

},{});

return (
k["Categoría de tu negocio"] || ""
)
.toLowerCase() === cat.toLowerCase();

});

renderizar(filtrados);

}

</script>

</body>
</html>
