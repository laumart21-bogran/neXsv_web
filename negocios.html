<script>

const url =
"https://script.google.com/macros/s/AKfycbz2iBCu10uZ_BZMkZUqDrWSTQdHkNSqWTpFxedVMfepEmbb43Eat5U5FQTEE_I8Eko/exec";

const ANALYTICS = url;

let dataGlobal = [];

/* ========================================
SLUG
======================================== */

function crearSlug(texto){

return texto
.toString()
.trim()
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "")
.replace(/[^\w\s-]/g, "")
.replace(/\s+/g, "-")
.replace(/-+/g, "-")
.replace(/^-+|-+$/g, "");

}

/* ========================================
FETCH
======================================== */

fetch(url)

.then(res => res.json())

.then(data => {

console.log(data);

dataGlobal = data;

renderizar(data);

})

.catch(error => {

console.error(error);

document.getElementById("contenedor").innerHTML = `

<div style="
grid-column:1/-1;
text-align:center;
padding:60px;
font-weight:700;
">

Error cargando negocios

</div>

`;

});

/* ========================================
DRIVE
======================================== */

function convertirDrive(link){

if(link && link.includes("drive.google.com")){

let match =
link.match(/\/d\/([a-zA-Z0-9_-]+)/);

if(!match){

match =
link.match(/id=([a-zA-Z0-9_-]+)/);

}

if(match){

return `https://drive.google.com/uc?export=view&id=${match[1]}`;

}

}

return link;

}

/* ========================================
RENDER
======================================== */

function renderizar(data){

const contenedor =
document.getElementById("contenedor");

const html = data.map(n => {

const k =
Object.keys(n).reduce((a,c)=>{

a[c.trim()] = n[c];

return a;

},{});

const nombre =
k["Nombre de tu negocio"] ||
"Negocio";

const descripcion =
k["Descripcion_final"] ||
k["Describe tu negocio"] ||
"";

const telefono =
(k["WhatsApp del negocio"] || "")
.replace("+","")
.replace(/\s/g,"");

const categoria =
k["Categoría de tu negocio"] ||
"Comunidad";

const ubicacionLink =
k["Link de ubicación del Negocio (Link de Google Maps)"] ||
k["Ubicación del Negocio (Link de Google Maps)"] ||
"#";

let img1 =
convertirDrive(
k["Link de imagen resp"] ||
k["Imagen_final"] ||
""
);

if(!img1){

img1 =
"https://via.placeholder.com/600x400";

}

const slug =
crearSlug(nombre);

return `

<div class="card">

<div class="card-image">

<img src="${img1}" loading="lazy">

<div class="badge">
${categoria}
</div>

</div>

<div class="card-content">

<h3>
${nombre}
</h3>

<p>
${descripcion.substring(0,95)}...
</p>

<div class="botones">

<a
href="#"
onclick="event.preventDefault(); irWhatsApp('${nombre.replace(/'/g,"\\'")}','${telefono}')"
class="btn btn-w">

WhatsApp

</a>

<a
href="negocio.html?id=${encodeURIComponent(slug)}"
class="btn btn-v">

Ver más

</a>

<button
onclick="compartirNegocio('${slug}','${nombre.replace(/'/g,"\\'")}')"
class="btn btn-share">

Compartir

</button>

</div>

<a
href="${ubicacionLink}"
target="_blank"
class="btn-map">

📍 Cómo llegar

</a>

</div>

</div>

`;

}).join("");

contenedor.innerHTML = html;

}

/* ========================================
COMPARTIR
======================================== */

function compartirNegocio(id,nombre){

const enlace =
`https://laumart21-bogran.github.io/neXsv_web/negocio.html?id=${encodeURIComponent(id)}`;

const mensaje =
`Descubre este negocio recomendado dentro de NeXsv.

${nombre}

Conecta con negocios y emprendedores confiables dentro de una comunidad privada.

${enlace}`;

const link =
"https://wa.me/?text=" +
encodeURIComponent(mensaje);

window.open(link,"_blank");

}

/* ========================================
WHATSAPP
======================================== */

function irWhatsApp(nombre,telefono){

fetch(ANALYTICS,{

method:"POST",

body:JSON.stringify({

tipo:"whatsapp",
negocio:nombre

})

});

window.open(
"https://wa.me/" + telefono,
"_blank"
);

}

/* ========================================
BUSCAR
======================================== */

function buscar(){

const texto =
document
.getElementById("buscador")
.value
.toLowerCase();

const filtrados =
dataGlobal.filter(n => {

const k =
Object.keys(n).reduce((a,c)=>{

a[c.trim()] = n[c];

return a;

},{});

return (
k["Nombre de tu negocio"] || ""
)
.toLowerCase()
.includes(texto);

});

renderizar(filtrados);

}

/* ========================================
FILTRAR
======================================== */

function filtrar(cat){

if(cat === "Todos"){

renderizar(dataGlobal);

return;

}

const filtrados =
dataGlobal.filter(n => {

const k =
Object.keys(n).reduce((a,c)=>{

a[c.trim()] = n[c];

return a;

},{});

return (
k["Categoría de tu negocio"] || ""
)
.toLowerCase() === cat.toLowerCase();

});

renderizar(filtrados);

}

</script>
