<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeXsv - Negocios</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Inter',sans-serif;
background:#F5F7FB;
color:#1D2A3A;
}

header{
padding:20px 40px;
background:white;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 15px rgba(0,0,0,.05);
}

header img{
height:70px;
}

.hero{
padding:80px 20px;
text-align:center;
background:linear-gradient(135deg,#1657B8,#19C2C6);
color:white;
}

.hero h1{
font-size:52px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
max-width:700px;
margin:auto;
line-height:1.8;
}

.main{
max-width:1200px;
margin:auto;
padding:50px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:28px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.card-content{
padding:24px;
}

.badge{
display:inline-block;
padding:8px 16px;
border-radius:999px;
background:#EAF2FF;
color:#1657B8;
font-size:13px;
font-weight:700;
margin-bottom:15px;
}

.card h3{
font-size:28px;
margin-bottom:14px;
color:#1657B8;
}

.card p{
color:#5d6677;
line-height:1.8;
margin-bottom:20px;
}

.botones{
display:flex;
flex-wrap:wrap;
gap:12px;
}

.btn{
flex:1;
padding:14px;
border-radius:14px;
text-decoration:none;
font-weight:700;
text-align:center;
transition:.3s;
border:none;
cursor:pointer;
}

.btn-whatsapp{
background:#74D67F;
color:white;
}

.btn-ver{
background:#1657B8;
color:white;
}

.btn-share{
background:#F7C531;
color:#1D2A3A;
}

.btn:hover{
transform:translateY(-3px);
}

</style>

</head>

<body>

<header>

<a href="index.html">
<img src="logo.png" alt="NeXsv">
</a>

</header>

<section class="hero">

<h1>
Explora negocios dentro de NeXsv
</h1>

<p>
Conecta con negocios y emprendedores confiables dentro de la comunidad privada.
</p>

</section>

<section class="main">

<div class="grid" id="contenedor"></div>

</section>

<script>

const url =
"https://script.google.com/macros/s/AKfycbz2iBCu10uZ_BZMkZUqDrWSTQdHkNSqWTpFxedVMfepEmbb43Eat5U5FQTEE_I8Eko/exec";

fetch(url)

.then(res => res.json())

.then(data => {

renderizar(data);

});

function convertirDrive(link){

if(link && link.includes("drive.google.com")){

let match =
link.match(/\/d\/([a-zA-Z0-9_-]+)/);

if(!match){

match =
link.match(/id=([a-zA-Z0-9_-]+)/);

}

if(match){

return `https://drive.google.com/uc?export=view&id=${match[1]}`;

}

}

return link;

}

function renderizar(data){

const contenedor =
document.getElementById("contenedor");

const html = data.map(n => {

const nombre =
n["Nombre de tu negocio"] || "Negocio";

const descripcion =
n["Descripcion_final"] ||
n["Describe tu negocio"] ||
"";

const categoria =
n["Categoría de tu negocio"] ||
"Comunidad";

const telefono =
(n["WhatsApp del negocio"] || "")
.replace("+","");

const imagen =
convertirDrive(
n["Link de imagen resp"] ||
n["Imagen_final"] ||
""
);

const id =
encodeURIComponent(nombre.trim());

return `

<div class="card">

<img src="${imagen}">

<div class="card-content">

<div class="badge">
${categoria}
</div>

<h3>
${nombre}
</h3>

<p>
${descripcion.substring(0,120)}...
</p>

<div class="botones">

<a
href="https://wa.me/${telefono}"
target="_blank"
class="btn btn-whatsapp">

WhatsApp

</a>

<a
href="negocio.html?id=${id}"
class="btn btn-ver">

Ver más

</a>

<button
onclick='compartirNegocio("${id}","${nombre.replace(/'/g,"")}");'
class="btn btn-share">

Compartir

</button>

</div>

</div>

</div>

`;

}).join("");

contenedor.innerHTML = html;

}

function compartirNegocio(id,nombre){

const enlace =
`https://laumart21-bogran.github.io/neXsv_web/negocio.html?id=${id}`;

const mensaje =
`Descubre este negocio recomendado dentro de NeXsv.

${nombre}

${enlace}`;

const whatsapp =
"https://wa.me/?text=" +
encodeURIComponent(mensaje);

window.open(whatsapp,"_blank");

}

</script>

</body>
</html>
