<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Crear cuenta | neXsv</title>

    <!-- Estilos compartidos -->
    <link rel="stylesheet" href="../css/auth-layout.css">

    <!-- Estilos específicos -->
    <link rel="stylesheet" href="../css/acceso.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<main class="access-page">

    <!-- Volver -->

    <a href="index.html" class="back-link">

        <i class="fa-solid fa-arrow-left"></i>

        Volver

    </a>

    <!-- Logo -->

    <a href="../index.html">

        <img src="../logo.png"
             alt="neXsv"
             class="logo">

    </a>

    <!-- Encabezado -->

    <section class="hero">

        <h1>

            Crea tu cuenta

        </h1>

        <p>

             Crea tu cuenta para acceder a una comunidad basada en confianza, descubrir negocios recomendados y aprovechar oportunidades exclusivas.

        </p>

    </section>

    <!-- Tarjeta -->

    <section class="auth-card">

        <form id="loginForm">

    <!-- Nombre completo -->

<div class="form-group">

    <label for="fullName">

        Nombre completo

    </label>

    <div class="input-group">

        <i class="fa-regular fa-user"></i>

        <input

            id="fullName"

            name="fullName"

            type="text"

            autocomplete="name"

            placeholder="Tu nombre completo"

            required>

    </div>

</div>      

            <!-- Correo -->

           <div class="form-group">

    <label for="email">

        Correo electrónico

    </label>

    <div class="input-group">

        <i class="fa-regular fa-envelope"></i>

        <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="correo@ejemplo.com"
            required>

    </div>

</div>
            <!-- Contraseña -->

            <div class="form-group">

    <label for="password">

        Contraseña

    </label>

    <div class="input-group">

        <i class="fa-solid fa-lock"></i>

        <input

            id="password"

            name="password"

            type="password"

            autocomplete="new-password"

            placeholder="••••••••"

            required>

       <button
    type="button"
    class="toggle-password"
    id="togglePassword"
    aria-label="Mostrar contraseña">

    <i
        id="togglePasswordIcon"
        class="fa-regular fa-eye">
    </i>

</button>
    </div>

</div>

<!-- Confirmar contraseña -->

<div class="form-group">

    <label for="confirmPassword">

        Confirmar contraseña

    </label>

    <div class="input-group">

        <i class="fa-solid fa-lock"></i>

        <input

            id="confirmPassword"

            name="confirmPassword"

            type="password"

            autocomplete="new-password"

            placeholder="••••••••"

            required>

        <button

            type="button"

            class="toggle-password"

            id="toggleConfirmPassword"

            aria-label="Mostrar contraseña">

            <i

                id="toggleConfirmPasswordIcon"

                class="fa-regular fa-eye">

            </i>

        </button>

    </div>

</div>
            <!-- Mensajes -->

            <div id="loginMessage"></div>

            <!-- Botón -->

            <button

                id="loginButton"

                class="primary-btn"

                type="submit">

                Crear cuenta

            </button>

        </form>

        <!-- Enlaces -->

       <div class="auth-links">

    <a href="login-usuario.html">

        ¿Ya tienes una cuenta? Entrar

    </a>

</div>

    </section>

    <!-- Footer -->

    <footer class="auth-footer">

        Exclusivo para comunidades privadas • Relaciones de confianza

    </footer>

</main>

<script src="../js/acceso.js"></script>

</body>

</html>
