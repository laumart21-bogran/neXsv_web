<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recuperar contraseña | neXsv</title>

    <!-- Estilos -->
    <link rel="stylesheet" href="../css/auth-layout.css">
    <link rel="stylesheet" href="../css/acceso.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<main class="access-page">

    <!-- Volver -->

    <a href="login-usuario.html" class="back-link">

        <i class="fa-solid fa-arrow-left"></i>

        Volver al acceso

    </a>

    <!-- Logo -->

    <a href="../index.html">

        <img src="../logo.png"
             alt="neXsv"
             class="logo">

    </a>

    <!-- Encabezado -->

    <section class="hero">

        <h1>

            Recupera tu contraseña

        </h1>

        <p>

            Escribe el correo con el que registraste tu cuenta.
            Te enviaremos un código para restablecer tu contraseña.

        </p>

    </section>

    <!-- Tarjeta -->

    <section class="auth-card">

        <form id="recoveryForm">

            <div class="form-group">

                <label for="email">

                    Correo electrónico

                </label>

                <div class="input-group">

                    <i class="fa-regular fa-envelope"></i>

                    <input
                        id="email"
                        name="email"
                        type="email"
                        autocomplete="email"
                        placeholder="correo@ejemplo.com"
                        required>

                </div>

            </div>

            <div id="recoveryMessage"></div>

            <button
                id="recoveryButton"
                class="primary-btn"
                type="submit">

                Enviar código

            </button>

        </form>

    </section>

    <footer class="auth-footer">

        Exclusivo para comunidades privadas • Relaciones de confianza

    </footer>

</main>

<script src="../js/config.js"></script>
<script src="../js/recuperar.js"></script>

</body>

</html>
