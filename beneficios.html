<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Beneficios - NeXsv</title>

<style>

html{
  font-size:16px;
}

body{
  margin:0;
  font-family:Arial;
  font-size:1rem;
  line-height:1.5;
  background:#f5f7fb;
  color:#333;
  overflow-x:hidden;
}

/* HEADER */
header{
  background:white;
  padding:12px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #eee;
}

header img{ height:70px; }

nav a{
  color:#2f4ea2;
  margin-left:20px;
  text-decoration:none;
  font-size:0.95rem;
}

/* SLIDER */
.slider-container{
  position:relative;
  width:100%;
  height:80vh;
  overflow:hidden;
}

.slider{
  display:flex;
  transition:0.5s ease;
  height:100%;
}

.slide{
  min-width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:white;
}

.slide img{
  width:100%;
  height:65%;
  object-fit:cover;
}

/* TEXTO */
.text{
  padding:20px;
  text-align:center;
  max-width:800px;
}

.text h2{
  color:#2f4ea2;
  font-size:1.5rem;
}

.text p{
  font-size:1rem;
  color:#555;
}

/* CTA */
.cta{
  text-align:center;
  padding:40px 20px;
}

.cta a{
  background:#4CAF50;
  color:white;
  padding:14px 25px;
  border-radius:8px;
  text-decoration:none;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:white;
  color:#555;
  font-size:0.9rem;
}

.footer-line{
  height:1px;
  background:#ddd;
  margin-bottom:15px;
}

/* MOBILE SIN ESCALAR TEXTO */
@media(max-width:768px){

  header{
    flex-direction:column;
    gap:10px;
    padding:15px;
  }

  .text h2{
    font-size:1.3rem;
  }

  .slider-container{
    height:70vh;
  }
}

</style>
</head>

<body>

<header>
<a href="index.html"><img src="logo.png"></a>
</header>

<!-- SLIDER (IGUAL JS) -->

<footer>
<div class="footer-line"></div>
© 2026 NeXsv
</footer>

</body>
</html>
