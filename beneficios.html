<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Beneficios - NeXsv</title>

<!-- TIPOGRAFÍA -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================================
RESET
======================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

:root{
--primary:#1657B8;
--secondary:#19C2C6;
--accent:#F7C531;
--success:#74D67F;
--bg:#F5F7FB;
--text:#1D2A3A;
--white:#ffffff;
}

html,body{
overflow-x:hidden;
max-width:100%;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
}

/* ========================================
HEADER PREMIUM
======================================== */

.nex-header{
position:fixed;
top:0;
left:0;
width:100%;

display:flex;
justify-content:space-between;
align-items:center;

padding:14px 28px;

background:rgba(255,255,255,.88);

backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);

border-bottom:1px solid rgba(255,255,255,.5);

z-index:9999;

box-shadow:
0 4px 20px rgba(0,0,0,.04);
}

.logo-wrap img{
height:56px;
display:block;
}

.nex-nav{
display:flex;
align-items:center;
gap:22px;
}

.nex-nav a{
text-decoration:none;
color:#1657B8;
font-weight:600;
font-size:15px;
transition:.3s;
white-space:nowrap;
}

.nex-nav a:hover{
opacity:.75;
}

.nex-btn{
background:linear-gradient(
135deg,
#F7C531,
#ffd95e
);

padding:12px 20px;

border-radius:14px;

font-weight:800;

color:#1D2A3A !important;

box-shadow:
0 10px 25px rgba(247,197,49,.25);
}

.menu-toggle{
display:none;

font-size:30px;
background:none;
border:none;

cursor:pointer;

color:#1657B8;
}

/* ========================================
HERO PREMIUM
======================================== */

.hero{
margin-top:84px;

width:100%;
min-height:55vh;

background:
linear-gradient(
rgba(7,20,45,.82),
rgba(7,20,45,.88)
),
url('cover-beneficios-premium.jpg') center center/cover no-repeat;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

padding:40px;

position:relative;
overflow:hidden;
}

.hero::before{
content:"";
position:absolute;
inset:0;

background:
linear-gradient(
180deg,
rgba(0,0,0,.10),
rgba(0,0,0,.35)
);

z-index:1;
}

.hero::after{
content:"";
position:absolute;

width:350px;
height:350px;

background:rgba(25,194,198,.18);

filter:blur(120px);

border-radius:50%;

top:-100px;
right:-120px;
}

.hero-content{
position:relative;
z-index:5;

max-width:850px;

animation:fadeUp 1s ease;
}

.hero-logo{
width:220px;
margin-bottom:30px;
filter:drop-shadow(0 10px 25px rgba(0,0,0,.25));
}

.hero h1{
font-size:62px;
line-height:1.05;
font-weight:800;
letter-spacing:-2px;

color:white;

margin-bottom:22px;
}

.hero p{
font-size:21px;
line-height:1.8;
color:rgba(255,255,255,.92);

max-width:760px;
margin:auto;
}

/* ========================================
SLIDER
======================================== */

.slider-section{
padding:100px 20px;
position:relative;
}

.slider-container{
position:relative;
max-width:1200px;
margin:auto;

overflow:hidden;

border-radius:40px;

box-shadow:
0 20px 60px rgba(0,0,0,.1);

background:white;
}

.slider{
display:flex;
transition:.6s ease;
}

.slide{
min-width:100%;
display:flex;
flex-direction:column;
background:white;
}

.slide img{
width:100%;
height:520px;
object-fit:cover;
}

/* ========================================
CONTENIDO
======================================== */

.text{
padding:50px 40px;
text-align:center;
position:relative;
overflow:hidden;
}

.text::before{
content:"";
position:absolute;

width:180px;
height:180px;

background:rgba(25,194,198,.08);

border-radius:50%;

top:-50px;
right:-50px;
}

.text h2{
font-size:42px;
font-weight:800;
color:var(--primary);
margin-bottom:18px;
position:relative;
z-index:2;
}

.text p{
font-size:18px;
line-height:1.9;
color:#5d6677;
max-width:760px;
margin:auto;
position:relative;
z-index:2;
}

/* ========================================
ARROWS
======================================== */

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);

width:58px;
height:58px;

border:none;
border-radius:50%;

font-size:24px;
cursor:pointer;

background:rgba(255,255,255,.78);
backdrop-filter:blur(10px);

box-shadow:
0 10px 30px rgba(0,0,0,.15);

transition:.35s;

z-index:5;
}

.arrow:hover{
background:var(--accent);
transform:translateY(-50%) scale(1.08);
}

.left{
left:22px;
}

.right{
right:22px;
}

/* ========================================
DOTS
======================================== */

.dots{
position:absolute;
bottom:25px;
width:100%;
text-align:center;
z-index:5;
}

.dot{
width:12px;
height:12px;

background:rgba(255,255,255,.6);

display:inline-block;

border-radius:50%;

margin:6px;

cursor:pointer;

transition:.3s;
}

.active{
background:var(--accent);
transform:scale(1.3);
}

/* ========================================
BENEFITS GRID
======================================== */

.extra-benefits{
max-width:1200px;
margin:90px auto 0;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:28px;
}

.benefit-card{
background:rgba(255,255,255,.8);
backdrop-filter:blur(14px);

padding:35px;

border-radius:30px;

box-shadow:
0 12px 35px rgba(0,0,0,.06);

transition:.35s;

position:relative;
overflow:hidden;
}

.benefit-card::before{
content:"";
position:absolute;

width:160px;
height:160px;

background:rgba(25,194,198,.08);

border-radius:50%;

top:-50px;
right:-50px;
}

.benefit-card:hover{
transform:translateY(-10px);

box-shadow:
0 22px 50px rgba(0,0,0,.12);
}

.benefit-icon{
font-size:42px;
margin-bottom:18px;
position:relative;
z-index:2;
}

.benefit-card h3{
font-size:28px;
font-weight:800;
color:var(--primary);
margin-bottom:15px;
position:relative;
z-index:2;
}

.benefit-card p{
font-size:17px;
line-height:1.8;
color:#5d6677;
position:relative;
z-index:2;
}

/* ========================================
CTA
======================================== */

.cta{
padding:110px 20px;
text-align:center;
}

.cta-box{
max-width:1100px;
margin:auto;

background:
linear-gradient(
135deg,
rgba(22,87,184,.96),
rgba(25,194,198,.92)
);

padding:70px 35px;

border-radius:40px;

position:relative;
overflow:hidden;

box-shadow:
0 20px 60px rgba(22,87,184,.22);
}

.cta-box::before{
content:"";
position:absolute;

width:350px;
height:350px;

background:rgba(255,255,255,.12);

filter:blur(90px);

top:-100px;
right:-80px;

border-radius:50%;
}

.cta-content{
position:relative;
z-index:2;
}

.cta h2{
font-size:50px;
line-height:1.15;
font-weight:800;

color:white;

margin-bottom:22px;
}

.cta p{
font-size:18px;
line-height:1.9;

color:rgba(255,255,255,.9);

max-width:760px;
margin:auto;

margin-bottom:40px;
}

.cta-btn{
display:inline-flex;
align-items:center;
justify-content:center;

background:linear-gradient(
135deg,
var(--accent),
#ffd95e
);

padding:18px 30px;

border-radius:18px;

color:#1D2A3A;

text-decoration:none;

font-weight:800;

font-size:16px;

transition:.35s;

box-shadow:
0 14px 35px rgba(247,197,49,.3);
}

.cta-btn:hover{
transform:translateY(-4px);
}

/* ========================================
FOOTER
======================================== */

footer{
background:white;
padding:40px 20px;
text-align:center;
color:#6b7280;
font-size:14px;
}

.footer-line{
width:100%;
height:1px;
background:#e5e7eb;
margin-bottom:20px;
}

footer a{
text-decoration:none;
color:var(--primary);
font-weight:700;
}

/* ========================================
ANIMACIONES
======================================== */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* ========================================
RESPONSIVE
======================================== */

@media(max-width:950px){

.menu-toggle{
display:block;
z-index:10001;
}

.nex-nav{
position:fixed;

top:0;
right:-100%;

width:280px;
height:100vh;

background:white;

flex-direction:column;
align-items:flex-start;
justify-content:flex-start;

padding:
100px 30px
40px;

gap:24px;

transition:.4s ease;

box-shadow:
-10px 0 30px rgba(0,0,0,.08);

z-index:10000;
}

.nex-nav.active{
right:0;
}

.nex-nav a{
font-size:17px;
}

.nex-btn{
width:100%;
text-align:center;
}

.hero{
min-height:46vh;
padding:30px 20px;
}

.hero-logo{
width:170px;
}

.hero h1{
font-size:42px;
}

.hero p{
font-size:18px;
}

.slide img{
height:320px;
}

.text{
padding:35px 25px;
}

.text h2{
font-size:32px;
}

.arrow{
width:48px;
height:48px;
font-size:20px;
}

.cta h2{
font-size:36px;
}

}

@media(max-width:480px){

.nex-header{
padding:12px 16px;
}

.logo-wrap img{
height:48px;
}

.hero{
padding:30px 18px;
min-height:50vh;
}

.hero-logo{
width:160px;
}

.hero h1{
font-size:34px;
letter-spacing:-1px;
}

.hero p{
font-size:16px;
}

.slide img{
height:230px;
}

.text h2{
font-size:26px;
}

.benefit-card{
padding:28px;
}

.cta-box{
padding:50px 22px;
}

.cta h2{
font-size:30px;
}

.cta p{
font-size:16px;
}

.extra-benefits{
grid-template-columns:1fr;
}

}

</style>
</head>
