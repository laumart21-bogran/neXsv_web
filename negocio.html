<script>

const url =
"https://script.google.com/macros/s/AKfycbz2iBCu10uZ_BZMkZUqDrWSTQdHkNSqWTpFxedVMfepEmbb43Eat5U5FQTEE_I8Eko/exec";

/* ========================================
SLUG
======================================== */

function crearSlug(texto){

return texto
.toString()
.trim()
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "")
.replace(/[^\w\s-]/g, "")
.replace(/\s+/g, "-")
.replace(/-+/g, "-")
.replace(/^-+|-+$/g, "");

}

/* ========================================
PARAMETRO URL
======================================== */

const params =
new URLSearchParams(window.location.search);

const id =
crearSlug(
decodeURIComponent(
params.get("id") || ""
)
);

/* ========================================
DRIVE
======================================== */

function convertirDrive(link){

if(link && link.includes("drive.google.com")){

let match =
link.match(/\/d\/([a-zA-Z0-9_-]+)/);

if(!match){

match =
link.match(/id=([a-zA-Z0-9_-]+)/);

}

if(match){

return `https://drive.google.com/uc?export=view&id=${match[1]}`;

}

}

return link;

}

/* ========================================
FETCH
======================================== */

fetch(url)

.then(res => res.json())

.then(data => {

/* ========================================
REVIEWS
======================================== */

const reviews =
data.reviews || [];

/* ========================================
BUSCAR NEGOCIO
======================================== */

const negocio =
(data.negocios || []).find(n => {

const k =
Object.keys(n).reduce((a,c)=>{

a[c.trim()] = n[c];

return a;

},{});

const nombreOriginal =
k["Nombre de tu negocio"] || "";

const slug =
crearSlug(nombreOriginal);

return slug === id;

});

/* ========================================
NO ENCONTRADO
======================================== */

if(!negocio){

document.getElementById("contenido").innerHTML = `

<div class="loading">
Negocio no encontrado
</div>

`;

return;

}

/* ========================================
NORMALIZAR KEYS
======================================== */

const k =
Object.keys(negocio).reduce((a,c)=>{

a[c.trim()] = negocio[c];

return a;

},{});

/* ========================================
DATOS
======================================== */

const nombre =
k["Nombre de tu negocio"] ||
"Negocio";

const descripcion =
k["Descripcion_final"] ||
k["Describe tu negocio"] ||
"";

const categoria =
k["Categoría de tu negocio"] ||
"Comunidad";

const telefono =
(k["WhatsApp del negocio"] || "")
.replace("+","")
.replace(/\s/g,"");

const mapa =
k["Link de ubicación del Negocio (Link de Google Maps)"] ||
k["Ubicación del Negocio (Link de Google Maps)"] ||
"#";

const img1 =
convertirDrive(
k["Link de imagen resp"] ||
k["Imagen_final"] ||
""
);

const img2 =
convertirDrive(
k["Imagen2"] || ""
);

const img3 =
convertirDrive(
k["Imagen3"] || ""
);

const imagenes =
[img1,img2,img3]
.filter(i => i);

/* ========================================
REVIEWS NEGOCIO
======================================== */

const reviewsNegocio =
reviews.filter(r => {

const slugReview =
crearSlug(r.slug || "");

return slugReview === id;

});

const totalReviews =
reviewsNegocio.length;

const promedio = totalReviews
? (
reviewsNegocio.reduce((acc,r)=>
acc + Number(r.estrellas || 0)
,0) / totalReviews
).toFixed(1)
: "0.0";

/* ========================================
HTML REVIEWS
======================================== */

const htmlReviews =
reviewsNegocio.map(r => `

<div style="
padding:18px;
background:#F8FAFF;
border-radius:18px;
margin-top:16px;
">

<div style="
font-weight:800;
margin-bottom:8px;
color:#1657B8;
">

⭐ ${r.estrellas} — ${r.nombre}

</div>

<div style="
line-height:1.7;
color:#5d6677;
">

${r.comentario}

</div>

</div>

`).join("");

/* ========================================
RENDER
======================================== */

document.getElementById("contenido").innerHTML = `

<div class="galeria">

${imagenes.map(img => `

<img src="${img}">

`).join("")}

</div>

<div class="info">

<div class="badge">
${categoria}
</div>

<h1>
${nombre}
</h1>

<p class="descripcion">
${descripcion}
</p>

<div style="
margin-bottom:30px;
padding:24px;
background:#F8FAFF;
border-radius:24px;
">

<div style="
font-size:34px;
font-weight:800;
color:#1657B8;
margin-bottom:10px;
">

⭐ ${promedio}

</div>

<div style="
color:#5d6677;
font-weight:700;
">

${totalReviews} reviews

</div>

</div>

<div class="botones">

<a
href="https://wa.me/${telefono}"
target="_blank"
class="btn btn-whatsapp">

WhatsApp

</a>

<a
href="${mapa}"
target="_blank"
class="btn btn-mapa">

📍 Cómo llegar

</a>

<button
onclick='compartirNegocio("${encodeURIComponent(crearSlug(nombre))}","${nombre.replace(/"/g, '&quot;')}")'
class="btn btn-share">

Compartir

</button>

</div>

<div style="margin-top:50px;">

<h2 style="
font-size:28px;
margin-bottom:20px;
color:#1657B8;
">

Reviews

</h2>

${htmlReviews || `

<div style="
padding:20px;
background:#F8FAFF;
border-radius:18px;
color:#5d6677;
font-weight:600;
">

Este negocio aún no tiene reviews.

</div>

`}

</div>

<div style="
margin-top:40px;
padding:30px;
background:#F8FAFF;
border-radius:24px;
">

<h2 style="
font-size:28px;
margin-bottom:25px;
color:#1657B8;
">

Deja tu review

</h2>

<input
type="text"
id="reviewNombre"
placeholder="Tu nombre"
style="
width:100%;
padding:16px;
border:none;
border-radius:16px;
margin-bottom:18px;
font-family:Inter,sans-serif;
font-size:15px;
background:white;
">

<select
id="reviewEstrellas"
style="
width:100%;
padding:16px;
border:none;
border-radius:16px;
margin-bottom:18px;
font-family:Inter,sans-serif;
font-size:15px;
background:white;
">

<option value="5">⭐⭐⭐⭐⭐ Excelente</option>
<option value="4">⭐⭐⭐⭐ Muy bueno</option>
<option value="3">⭐⭐⭐ Bueno</option>
<option value="2">⭐⭐ Regular</option>
<option value="1">⭐ Malo</option>

</select>

<textarea
id="reviewComentario"
placeholder="Comparte tu experiencia..."
style="
width:100%;
height:140px;
padding:16px;
border:none;
border-radius:16px;
margin-bottom:20px;
font-family:Inter,sans-serif;
font-size:15px;
resize:none;
background:white;
"></textarea>

<button
onclick="enviarReview('${id}')"
style="
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-weight:800;
font-size:16px;
cursor:pointer;
background:linear-gradient(
135deg,
#19C2C6,
#1657B8
);
color:white;
">

Enviar review

</button>

<div
id="mensajeReview"
style="
margin-top:18px;
font-weight:700;
color:#1657B8;
text-align:center;
"></div>

</div>

</div>

`;

})

.catch(error => {

console.error(error);

document.getElementById("contenido").innerHTML = `

<div class="loading">
Error cargando negocio
</div>

`;

});

/* ========================================
COMPARTIR
======================================== */

function compartirNegocio(id,nombre){

const enlace =
`https://laumart21-bogran.github.io/neXsv_web/negocio.html?id=${id}`;

const mensaje =
`Descubre este negocio recomendado dentro de NeXsv.

${nombre}

Conecta con negocios y emprendedores confiables dentro de una comunidad privada.

${enlace}`;

const link =
"https://wa.me/?text=" +
encodeURIComponent(mensaje);

window.open(link,"_blank");

}

/* ========================================
ENVIAR REVIEW
======================================== */

function enviarReview(slug){

const nombre =
document
.getElementById("reviewNombre")
.value
.trim();

const estrellas =
document
.getElementById("reviewEstrellas")
.value;

const comentario =
document
.getElementById("reviewComentario")
.value
.trim();

const mensaje =
document.getElementById("mensajeReview");

if(!nombre || !comentario){

mensaje.innerHTML =
"Completa todos los campos";

return;

}

fetch(url,{

method:"POST",

body:JSON.stringify({

slug:slug,
nombre:nombre,
estrellas:estrellas,
comentario:comentario

})

})

.then(res => res.json())

.then(data => {

mensaje.innerHTML =
"✅ Review enviada correctamente";

document.getElementById("reviewNombre").value = "";
document.getElementById("reviewComentario").value = "";
document.getElementById("reviewEstrellas").value = "5";

setTimeout(()=>{

location.reload();

},1200);

})

.catch(error => {

console.error(error);

mensaje.innerHTML =
"Error enviando review";

});

}

</script>
