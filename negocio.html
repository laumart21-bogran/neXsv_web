<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeXsv - Negocio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#F5F7FB;
color:#1D2A3A;
}

header{
padding:20px 40px;
background:white;
box-shadow:0 2px 15px rgba(0,0,0,.05);
}

header img{
height:70px;
}

.container{
max-width:1200px;
margin:auto;
padding:50px 20px;
}

.galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-bottom:40px;
}

.galeria img{
width:100%;
height:320px;
object-fit:cover;
border-radius:24px;
}

.info{
background:white;
padding:40px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.badge{
display:inline-block;
padding:10px 18px;
border-radius:999px;
background:#EAF2FF;
color:#1657B8;
font-size:14px;
font-weight:700;
margin-bottom:18px;
}

h1{
font-size:48px;
margin-bottom:20px;
color:#1657B8;
}

.descripcion{
font-size:18px;
line-height:1.9;
color:#5d6677;
margin-bottom:35px;
}

.botones{
display:flex;
flex-wrap:wrap;
gap:15px;
}

.btn{
padding:16px 24px;
border-radius:16px;
text-decoration:none;
font-weight:700;
transition:.3s;
display:inline-block;
border:none;
cursor:pointer;
}

.btn-whatsapp{
background:#74D67F;
color:white;
}

.btn-mapa{
background:#1657B8;
color:white;
}

.btn-share{
background:#F7C531;
color:#1D2A3A;
}

.loading{
text-align:center;
padding:100px 20px;
font-size:24px;
font-weight:700;
}

</style>

</head>

<body>

<header>

<a href="negocios.html">
<img src="logo.png" alt="NeXsv">
</a>

</header>

<div class="container" id="contenido">

<div class="loading">
Cargando negocio...
</div>

</div>

<script>

const url =
"https://script.google.com/macros/s/AKfycbz2iBCu10uZ_BZMkZUqDrWSTQdHkNSqWTpFxedVMfepEmbb43Eat5U5FQTEE_I8Eko/exec";

const params =
new URLSearchParams(window.location.search);

const id =
decodeURIComponent(params.get("id") || "").trim();

function convertirDrive(link){

if(link && link.includes("drive.google.com")){

let match =
link.match(/\/d\/([a-zA-Z0-9_-]+)/);

if(!match){

match =
link.match(/id=([a-zA-Z0-9_-]+)/);

}

if(match){

return `https://drive.google.com/uc?export=view&id=${match[1]}`;

}

}

return link;

}

fetch(url)

.then(res => res.json())

.then(data => {

const negocio = data.find(n => {

const nombre =
(n["Nombre de tu negocio"] || "").trim();

return nombre === id;

});

if(!negocio){

document.getElementById("contenido").innerHTML = `

<div class="loading">
Negocio no encontrado
</div>

`;

return;

}

const nombre =
negocio["Nombre de tu negocio"] || "Negocio";

const descripcion =
negocio["Descripcion_final"] ||
negocio["Describe tu negocio"] ||
"";

const categoria =
negocio["Categoría de tu negocio"] ||
"Comunidad";

const telefono =
(negocio["WhatsApp del negocio"] || "")
.replace("+","");

const mapa =
negocio["Link de ubicación del Negocio (Link de Google Maps)"] ||
"#";

const img1 =
convertirDrive(
negocio["Link de imagen resp"] ||
negocio["Imagen_final"] ||
""
);

const img2 =
convertirDrive(
negocio["Imagen2"] || ""
);

const img3 =
convertirDrive(
negocio["Imagen3"] || ""
);

const imagenes =
[img1,img2,img3].filter(i => i);

document.getElementById("contenido").innerHTML = `

<div class="galeria">

${imagenes.map(img => `
<img src="${img}">
`).join("")}

</div>

<div class="info">

<div class="badge">
${categoria}
</div>

<h1>
${nombre}
</h1>

<p class="descripcion">
${descripcion}
</p>

<div class="botones">

<a
href="https://wa.me/${telefono}"
target="_blank"
class="btn btn-whatsapp">

WhatsApp

</a>

<a
href="${mapa}"
target="_blank"
class="btn btn-mapa">

Cómo llegar

</a>

<button
onclick='compartirNegocio("${encodeURIComponent(nombre)}","${nombre.replace(/'/g,"")}");'
class="btn btn-share">

Compartir

</button>

</div>

</div>

`;

});

function compartirNegocio(id,nombre){

const enlace =
`https://laumart21-bogran.github.io/neXsv_web/negocio.html?id=${id}`;

const mensaje =
`Descubre este negocio recomendado dentro de NeXsv.

${nombre}

${enlace}`;

const whatsapp =
"https://wa.me/?text=" +
encodeURIComponent(mensaje);

window.open(whatsapp,"_blank");

}

</script>

</body>
</html>
