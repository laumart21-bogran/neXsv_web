<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeXsv - Negocio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#F5F7FB;
color:#1D2A3A;
}

header{
padding:20px 40px;
background:white;
box-shadow:0 2px 15px rgba(0,0,0,.05);
display:flex;
justify-content:space-between;
align-items:center;
}

header img{
height:70px;
}

.container{
max-width:1200px;
margin:auto;
padding:50px 20px;
}

.galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-bottom:40px;
}

.galeria img{
width:100%;
height:320px;
object-fit:cover;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.info{
background:white;
padding:40px;
border-radius:28px;
box-shadow:0 12px 35px rgba(0,0,0,.06);
}

.badge{
display:inline-block;
background:#EAF2FF;
color:#1657B8;
padding:10px 18px;
border-radius:999px;
font-size:14px;
font-weight:700;
margin-bottom:18px;
}

h1{
font-size:48px;
margin-bottom:20px;
color:#1657B8;
}

.descripcion{
font-size:18px;
line-height:1.9;
color:#5d6677;
margin-bottom:35px;
}

.botones{
display:flex;
flex-wrap:wrap;
gap:15px;
}

.btn{
padding:16px 24px;
border-radius:16px;
text-decoration:none;
font-weight:700;
transition:.3s;
display:inline-block;
}

.btn-whatsapp{
background:linear-gradient(135deg,#74D67F,#56c76a);
color:white;
}

.btn-mapa{
background:linear-gradient(135deg,#19C2C6,#1657B8);
color:white;
}

.btn-share{
background:linear-gradient(135deg,#F7C531,#ffd95e);
color:#1D2A3A;
border:none;
cursor:pointer;
}

.btn:hover{
transform:translateY(-3px);
}

.loading{
text-align:center;
padding:100px 20px;
font-size:22px;
font-weight:700;
}

@media(max-width:768px){

header{
padding:18px;
}

header img{
height:55px;
}

h1{
font-size:34px;
}

.descripcion{
font-size:16px;
}

.info{
padding:25px;
}

.botones{
flex-direction:column;
}

.btn{
width:100%;
text-align:center;
}

}

</style>

</head>

<body>

<header>

<a href="negocios.html">
<img src="logo.png" alt="NeXsv">
</a>

</header>

<div class="container" id="contenido">

<div class="loading">
Cargando negocio...
</div>

</div>

<script>

const url =
"https://script.google.com/macros/s/AKfycbz2iBCu10uZ_BZMkZUqDrWSTQdHkNSqWTpFxedVMfepEmbb43Eat5U5FQTEE_I8Eko/exec";

/* ========================================
SLUG
======================================== */

function crearSlug(texto){

return texto
.toString()
.trim()
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "")
.replace(/[^\w\s-]/g, "")
.replace(/\s+/g, "-")
.replace(/-+/g, "-")
.replace(/^-+|-+$/g, "");

}

/* ========================================
PARAMETRO URL
======================================== */

const params =
new URLSearchParams(window.location.search);

const id =
crearSlug(
decodeURIComponent(
params.get("id") || ""
)
);

/* ========================================
DRIVE
======================================== */

function convertirDrive(link){

if(link && link.includes("drive.google.com")){

let match =
link.match(/\/d\/([a-zA-Z0-9_-]+)/);

if(!match){

match =
link.match(/id=([a-zA-Z0-9_-]+)/);

}

if(match){

return `https://drive.google.com/uc?export=view&id=${match[1]}`;

}

}

return link;

}

/* ========================================
FETCH
======================================== */

fetch(url)

.then(res => res.json())

.then(data => {

/* ========================================
BUSCAR NEGOCIO
======================================== */

const negocio = data.find(n => {

const k =
Object.keys(n).reduce((a,c)=>{

a[c.trim()] = n[c];

return a;

},{});

const nombreOriginal =
k["Nombre de tu negocio"] || "";

const slug =
crearSlug(nombreOriginal);

return slug === id;

});

/* ========================================
NO ENCONTRADO
======================================== */

if(!negocio){

document.getElementById("contenido").innerHTML = `

<div class="loading">
Negocio no encontrado
</div>

`;

return;

}

/* ========================================
NORMALIZAR KEYS
======================================== */

const k =
Object.keys(negocio).reduce((a,c)=>{

a[c.trim()] = negocio[c];

return a;

},{});

/* ========================================
DATOS
======================================== */

const nombre =
k["Nombre de tu negocio"] ||
"Negocio";

const descripcion =
k["Descripcion_final"] ||
k["Describe tu negocio"] ||
"";

const categoria =
k["Categoría de tu negocio"] ||
"Comunidad";

const telefono =
(k["WhatsApp del negocio"] || "")
.replace("+","")
.replace(/\s/g,"");

const mapa =
k["Link de ubicación del Negocio (Link de Google Maps)"] ||
k["Ubicación del Negocio (Link de Google Maps)"] ||
"#";

const img1 =
convertirDrive(
k["Link de imagen resp"] ||
k["Imagen_final"] ||
""
);

const img2 =
convertirDrive(
k["Imagen2"] || ""
);

const img3 =
convertirDrive(
k["Imagen3"] || ""
);

const imagenes =
[img1,img2,img3]
.filter(i => i);

/* ========================================
RENDER
======================================== */

document.getElementById("contenido").innerHTML = `

<div class="galeria">

${imagenes.map(img => `

<img src="${img}">

`).join("")}

</div>

<div class="info">

<div class="badge">
${categoria}
</div>

<h1>
${nombre}
</h1>

<p class="descripcion">
${descripcion}
</p>

<div class="botones">

<a
href="https://wa.me/${telefono}"
target="_blank"
class="btn btn-whatsapp">

WhatsApp

</a>

<a
href="${mapa}"
target="_blank"
class="btn btn-mapa">

📍 Cómo llegar

</a>

<button
onclick='compartirNegocio("${encodeURIComponent(crearSlug(nombre))}","${nombre.replace(/"/g, '&quot;')}")'
class="btn btn-share">

Compartir

</button>

</div>

</div>

`;

})

.catch(error => {

console.error(error);

document.getElementById("contenido").innerHTML = `

<div class="loading">
Error cargando negocio
</div>

`;

});

/* ========================================
COMPARTIR
======================================== */

function compartirNegocio(id,nombre){

const enlace =
`https://laumart21-bogran.github.io/neXsv_web/negocio.html?id=${id}`;

const mensaje =
`Descubre este negocio recomendado dentro de NeXsv.

${nombre}

Conecta con negocios y emprendedores confiables dentro de una comunidad privada.

${enlace}`;

const link =
"https://wa.me/?text=" +
encodeURIComponent(mensaje);

window.open(link,"_blank");

}

</script>
  
</body>
</html>
