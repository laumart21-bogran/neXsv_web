```html
<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Negocio | NeXsv</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#F5F7FB;
color:#1D2A3A;
}

.container{
max-width:900px;

}

.card{

}

.hero-img{

}

padding:35px;
}

.badge{
display:inline-block;

color:#1657B8;
margin-bottom:20px;
}

h1{

}

.desc{
font-size:18px;
line-height:1.8;

}

.buttons{

gap:15px;

}

.btn{

}

}

.btn-map{

.btn-share{

</style>

</head>

<body>

<div class="container">

<div class="card">

<img
id="imagen"
class="hero-img"
src="">

<div class="content">

<div
class="badge"
id="categoria">
Categoría
</div>

<h1 id="nombre">
Negocio
</h1>

<p
class="desc"
id="descripcion">
Descripción
</p>

<div class="buttons">

<a
id="btnWhatsapp"
target="_blank"
class="btn btn-whatsapp">

WhatsApp

</a>

<a
id="btnMapa"
target="_blank"
class="btn btn-map">

Cómo llegar

</a>

<a
href="#"
id="btnCompartir"
class="btn btn-share">

Compartir

</a>

</div>

</div>

</div>

</div>

<script>

const url =
"https://script.google.com/macros/s/AKfycbz2iBCu10uZ_BZMkZUqDrWSTQdHkNSqWTpFxedVMfepEmbb43Eat5U5FQTEE_I8Eko/exec";

function convertirDrive(link){

if(link && link.includes("drive.google.com")){

let match =
link.match(/\/d\/([a-zA-Z0-9_-]+)/);

if(!match){

match =
link.match(/id=([a-zA-Z0-9_-]+)/);

}

if(match){

return `https://drive.google.com/uc?export=view&id=${match[1]}`;

}

}

return link;

}

const params =
new URLSearchParams(window.location.search);

const id =
params.get("id");

fetch(url)

.then(res => res.json())

.then(data => {

const negocio =
data.find(n => {

const nombre =
(
n["Nombre de tu negocio"] || ""
)
.toLowerCase()
.replace(/\s+/g,'-');

return nombre === id;

});

if(!negocio){

document.body.innerHTML =
"<h1 style='padding:40px;text-align:center;'>Negocio no encontrado</h1>";

return;

}

const nombre =
negocio["Nombre de tu negocio"];

const descripcion =
negocio["Descripcion_final"] ||
negocio["Describe tu negocio"];

const categoria =
negocio["Categoría de tu negocio"];

const telefono =
(
negocio["WhatsApp del negocio"] || ""
).replace("+","");

const mapa =
negocio["Link de ubicación del Negocio (Link de Google Maps)"] ||
"#";

const imagen =
convertirDrive(
negocio["Link de imagen resp"] ||
negocio["Imagen_final"]
);

document.title =
nombre + " | NeXsv";

document.getElementById("nombre")
.innerText = nombre;

document.getElementById("descripcion")
.innerText = descripcion;

document.getElementById("categoria")
.innerText = categoria;

document.getElementById("imagen")
.src = imagen;

document.getElementById("btnWhatsapp")
.href =
"https://wa.me/" + telefono;

document.getElementById("btnMapa")
.href = mapa;

document.getElementById("btnCompartir")
.onclick = () => {

const mensaje =
`Descubre este negocio dentro de NeXsv:

${nombre}

https://laumart21-bogran.github.io/neXsv_web/negocio.html?id=${id}`;

window.open(
"https://wa.me/?text=" +
encodeURIComponent(mensaje),
"_blank"
);

};

});

</script>

</body>
</html>
