<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Blog - NeXsv</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
}

/* HEADER */
header{
  background:white;
  padding:12px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #eee;
}

header img{
  height:70px;
}

nav a{
  color:#2f4ea2;
  margin-left:20px;
  text-decoration:none;
}

.nav-btn{
  background:#4CAF50;
  padding:10px 15px;
  border-radius:8px;
  color:white;
}

/* GRID BLOG */
.blog-grid{
  max-width:1100px;
  margin:40px auto;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap:25px;
}

/* CARD */
.blog-card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.blog-card:hover{
  transform:translateY(-5px);
}

.blog-card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.blog-card-content{
  padding:20px;
}

.blog-card h3{
  margin:0 0 10px;
}

.blog-card p{
  color:#555;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  margin-top:40px;
  background:white;
  color:#555;
  font-size:14px;
}

.footer-line{
  width:100%;
  height:1px;
  background:#ddd;
  margin-bottom:15px;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <img src="logo.png">

  <nav>
    <a href="index.html">Inicio</a>
    <a href="como.html">Cómo funciona</a>
    <a href="beneficios.html">Beneficios</a>
    <a href="negocios.html">Negocios</a>
    <a href="blog.html">Blog</a>

    <a class="nav-btn"
    href="https://docs.google.com/forms/d/e/1FAIpQLSeDIKEEkzAxlmfRmTNLVBQoiiNxrbpbRcqk3C3iL73QCDMhyw/viewform"
    target="_blank">
    Solicitar acceso
    </a>
  </nav>
</header>

<!-- BLOG GRID -->
<section class="blog-grid">

<!-- BLOG 1 -->
<div class="blog-card" onclick="window.location.href='Blogs/por-que-no-vendes.html'">
  <img src="https://images.unsplash.com/photo-1556740738-b6a63e27c4df">
  <div class="blog-card-content">
    <h3>¿Por qué no vendes?</h3>
    <p>Descubre qué está frenando tu negocio y cómo solucionarlo.</p>
  </div>
</div>

<!-- BLOG 2 -->
<div class="blog-card" onclick="window.location.href='Blogs/como-vender-en-whatsapp.html'">
  <img src="https://images.unsplash.com/photo-1587614382346-4ec70e388b28">
  <div class="blog-card-content">
    <h3>Cómo vender por WhatsApp</h3>
    <p>Convierte conversaciones en ventas reales sin ser insistente.</p>
  </div>
</div>

</section>

<!-- FOOTER -->
<footer>
  <div class="footer-line"></div>
  © 2026 NeXsv | 
  <a href="terminos.html">Términos y condiciones</a>
</footer>

</body>
</html>
