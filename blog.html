<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Blog - NeXsv</title>

<style>
body{font-family:Arial;background:#f5f7fb;margin:0;}

.post{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
cursor:pointer;
}

.contenido{display:none;}

.post.activo .contenido{display:block;}
</style>
</head>

<body>

<div class="post" onclick="toggle(this)">
<h3>¿Por qué no vendes?</h3>

<div class="contenido">
<p>Tu problema no es el producto...</p>
<img src="https://via.placeholder.com/400">
<p>Es la visibilidad correcta...</p>
</div>

</div>

<script>
function toggle(el){
el.classList.toggle("activo");
}
</script>

</body>
</html>
