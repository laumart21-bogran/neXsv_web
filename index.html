<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeXsv</title>

<style>

html{
  font-size:16px;
}

body{
  margin:0;
  font-family: Arial;
  font-size:1rem;
  line-height:1.5;
  background:#f5f7fb;
  color:#333;
}

/* HERO */
.hero{
  width:100%;
  height:60vh;
  background:url('cover-index.jpg') center/cover;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:60px;
  position:relative;
  color:white;
}

.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  top:0;
  left:0;
}

.hero div,
.hero img{
  position:relative;
  z-index:2;
}

.hero img{
  width:400px;
  max-width:100%;
}

.hero h1{
  font-size:2.2rem;
}

.hero p{
  font-size:1rem;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
}

/* TESTIMONIOS */
.testimonial{
  background:white;
  padding:20px;
  border-left:5px solid #3f5b8a;
  border-radius:10px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  margin-top:40px;
  background:white;
  color:#555;
  font-size:0.9rem;
}

.footer-line{
  width:100%;
  height:1px;
  background:#ddd;
  margin-bottom:15px;
}

footer a{
  color:#2f4ea2;
  text-decoration:none;
}

/* MOBILE (SIN ESCALAR FUENTE) */
@media(max-width:768px){

  .hero{
    flex-direction:column;
    text-align:center;
    padding:30px;
    height:auto;
    gap:20px;
  }

  .hero h1{
    font-size:2rem;
  }

  .hero img{
    width:250px;
  }

  .grid{
    padding:20px;
  }
}

</style>
</head>

<body>

<script src="components/header.js"></script>

<section class="hero">
<div>
<h1>Conecta, compra y crece</h1>
<p>Red privada de conexión entre padres de familia y negocios.</p>

<a href="negocios.html">Explorar negocios</a>
</div>
</section>

<footer>
  <div class="footer-line"></div>
  © 2026 NeXsv
</footer>

</body>
</html>
