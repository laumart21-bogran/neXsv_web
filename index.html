<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NeXsv</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6fb;
}

/* NAVBAR */
.navbar {
  background: linear-gradient(90deg, #2A4B7C, #3b5c94);
  padding: 10px 40px;
}

.navbar img {
  height: 70px;
}

/* HERO */
.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 60px;
  background: #eef2f7;
}

.hero h1 {
  font-size: 40px;
  text-transform: lowercase;
}

.hero img {
  width: 300px;
}

.btn {
  margin-top: 20px;
  padding: 12px 20px;
  background: #34A88E;
  color: white;
  border-radius: 10px;
  text-decoration: none;
}

/* GRID */
.grid {
  padding: 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

/* TARJETAS */
.card {
  background: white;
  border-radius: 15px;
  padding: 18px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

.card h3 {
  margin-bottom: 5px;
}

.card p {
  font-size: 14px;
  color: #555;
}

.btn-whatsapp {
  display: inline-block;
  margin-top: 12px;
  padding: 10px 14px;
  background: #25D366;
  color: white;
  border-radius: 10px;
  text-decoration: none;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <img src="logo.png">
</div>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>conecta, compra y crece</h1>
    <p>red de negocios entre padres en el salvador</p>
    <a class="btn" href="#">unirme ahora</a>
  </div>

  <!-- IMAGEN CORRECTA -->
  <img src="https://cdn-icons-png.flaticon.com/512/1995/1995574.png">
</div>

<!-- TARJETAS -->
<div class="grid" id="contenedor"></div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzF0bM2tWAxX2lTgBP-6WnkJeV2kohQHPVV4FLubDH5NENFUgFH_Vs7ufepbyJ6NXa4/exec";

fetch(URL)
.then(res => res.json())
.then(data => {

  const contenedor = document.getElementById("contenedor");

  data.forEach(item => {

    const nombre = item["Nombre de tu negocio"] || "negocio";

    const descripcion = item["Describe tu negocio en 1-2 líneas"]
      || item["¿Qué vendes o qué servicio ofreces?"]
      || "sin descripción";

    let whatsapp = item["WhatsApp del negocio"] || "";
    whatsapp = whatsapp.replace(/\D/g, "");

    const card = `
      <div class="card">
        <h3>${nombre}</h3>

        <p>${descripcion}</p>

        <a class="btn-whatsapp" href="https://wa.me/${whatsapp}" target="_blank">
          contactar
        </a>
      </div>
    `;

    contenedor.innerHTML += card;

  });

})
.catch(() => {
  document.body.innerHTML += "<p style='color:red'>Error cargando datos</p>";
});

</script>

</body>
</html>
