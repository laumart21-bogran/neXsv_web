<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeXsv</title>

<!-- TIPOGRAFÍA -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================================
RESET
======================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

:root{
--primary:#1657B8;
--secondary:#19C2C6;
--accent:#F7C531;
--success:#74D67F;
--bg:#F5F7FB;
--text:#1D2A3A;
--white:#ffffff;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* ========================================
HEADER
======================================== */

.top-blur{
position:fixed;
top:0;
left:0;
width:100%;
height:88px;

background:rgba(255,255,255,.82);

backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);

z-index:998;

border-bottom:1px solid rgba(255,255,255,.45);
}

/* HEADER REAL */

header{
position:fixed;
top:0;
left:0;
width:100%;

padding:14px 32px;

display:flex;
justify-content:space-between;
align-items:center;

z-index:1000;
}

header img{
height:62px;
}

nav{
display:flex;
align-items:center;
gap:22px;
flex-wrap:wrap;
}

nav a{
text-decoration:none;
color:var(--primary);
font-weight:600;
font-size:15px;
transition:.3s;
}

nav a:hover{
color:var(--secondary);
}

.nav-btn{
background:linear-gradient(
135deg,
var(--accent),
#ffd95e
);

padding:12px 20px;
border-radius:14px;

color:#1D2A3A !important;

font-weight:700;

box-shadow:
0 10px 25px rgba(247,197,49,.25);
}

/* ========================================
HERO
======================================== */

.hero{
width:100%;

min-height:100vh;

background:
linear-gradient(
rgba(9,28,61,.78),
rgba(9,28,61,.82)
),
url('cover-index.jpg') center/cover no-repeat;

display:flex;
align-items:center;

padding:
140px 60px 90px;

position:relative;
overflow:hidden;
}

.hero::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:rgba(25,194,198,.18);
filter:blur(120px);
top:-100px;
right:-100px;
border-radius:50%;
}

.hero::after{
content:"";
position:absolute;
width:350px;
height:350px;
background:rgba(247,197,49,.12);
filter:blur(100px);
bottom:-120px;
left:-80px;
border-radius:50%;
}

.hero-content{
position:relative;
z-index:2;
max-width:700px;
animation:fadeUp 1s ease;
}

.hero-logo{
width:230px;
margin-bottom:30px;
}

.hero h1{
font-size:68px;
line-height:1.05;
font-weight:800;
color:white;
margin-bottom:25px;
letter-spacing:-2px;
}

.hero p{
font-size:22px;
line-height:1.8;
color:rgba(255,255,255,.88);
margin-bottom:40px;
max-width:650px;
}

/* ========================================
BOTONES
======================================== */

.hero-buttons{
display:flex;
flex-wrap:wrap;
gap:18px;
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:17px 30px;
border-radius:18px;
text-decoration:none;
font-weight:700;
transition:.35s;
font-size:16px;
}

.btn-primary{
background:linear-gradient(
135deg,
var(--accent),
#ffd95e
);

color:#1D2A3A;

box-shadow:
0 15px 35px rgba(247,197,49,.28);
}

.btn-secondary{
background:rgba(255,255,255,.12);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.18);
color:white;
}

.btn:hover{
transform:translateY(-4px);
}

/* ========================================
SECCIONES
======================================== */

.section{
padding:100px 20px;
position:relative;
}

.container{
max-width:1200px;
margin:auto;
}

.section-center{
text-align:center;
}

.section h2{
font-size:52px;
line-height:1.15;
font-weight:800;
margin-bottom:25px;
color:var(--primary);
letter-spacing:-1px;
}

.section p{
font-size:18px;
line-height:1.9;
color:#5d6677;
}

/* ========================================
FOOTER
======================================== */

footer{
background:white;
padding:40px 20px;
text-align:center;
margin-top:60px;
color:#6b7280;
font-size:14px;
}

.footer-line{
width:100%;
height:1px;
background:#e5e7eb;
margin-bottom:20px;
}

footer a{
text-decoration:none;
color:var(--primary);
font-weight:700;
}

/* ========================================
ANIMACIONES
======================================== */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* ========================================
RESPONSIVE
======================================== */

@media(max-width:768px){

.top-blur{
height:135px;
}

header{
padding:18px 20px;
flex-direction:column;
justify-content:center;
gap:14px;
}

header img{
height:58px;
}

nav{
width:100%;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:14px;
}

nav a{
font-size:15px;
}

.nav-btn{
padding:14px 24px;
border-radius:18px;
font-size:16px;
}

.hero{
min-height:auto;

padding:
210px 24px 90px;

text-align:left;
}

.hero-content{
max-width:100%;
}

.hero-logo{
width:150px;
margin-bottom:25px;
}

.hero h1{
font-size:54px;
line-height:1.02;
margin-bottom:20px;
}

.hero p{
font-size:20px;
line-height:1.7;
margin-bottom:35px;
}

.hero-buttons{
width:100%;
flex-direction:column;
gap:16px;
}

.btn{
width:100%;
min-height:58px;
font-size:17px;
border-radius:20px;
}

.section{
padding:80px 22px;
}

.section h2{
font-size:42px;
line-height:1.08;
}

.section p{
font-size:18px;
line-height:1.8;
}

}

/* ========================================
MÓVILES PEQUEÑOS
======================================== */

@media(max-width:480px){

.hero{
padding:
220px 20px 80px;
}

.hero h1{
font-size:46px;
}

.hero p{
font-size:18px;
}

.hero-logo{
width:140px;
}

nav{
gap:12px;
}

nav a{
font-size:14px;
}

.nav-btn{
width:100%;
text-align:center;
}

}

</style>
</head>

</div>

<footer>
