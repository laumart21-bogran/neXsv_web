<script>
const URL = "https://script.google.com/macros/s/AKfycbwiyqC2dKyBcVQTuyUNoUk--cW_U_sTYdQXBLTPWjvpHMo-PLUR7BwHGDKwxHWv4Bej/exec";

let datos = [];

// CARGAR DATOS
fetch(URL)
.then(res => res.json())
.then(data => {
    datos = data;
    render(data);
});

// FUNCIÓN RENDER
function render(lista) {
    const contenedor = document.getElementById("contenedor");
    contenedor.innerHTML = "";

    lista.forEach(item => {

        // 🟢 FILTRO OPCIONAL (OCULTAR INACTIVOS)
        if(item["Estado"] === "Inactivo") return;

        // 📌 DATOS DESDE GOOGLE SHEETS
        const nombre = item["Nombre de tu negocio"] || "Negocio";

        const descripcion = item["¿Qué vendes o qué servicio ofreces?"] || "";

        const telefono = item["WhatsApp del nego"] 
            || item["Número de WhatsApp"] 
            || item["WhatsApp"] 
            || "";

        let imagen = item["Link de imagen de tu"] 
            || item["Link de imagen del negocio"] 
            || "";

        // 🧠 CORREGIR IMAGEN DE GOOGLE DRIVE
        if(imagen.includes("drive.google.com")){
            const id = imagen.split("/d/")[1]?.split("/")[0];
            if(id){
                imagen = `https://drive.google.com/uc?export=view&id=${id}`;
            }
        }

        // 🔁 IMAGEN POR DEFECTO
        if(!imagen){
            imagen = "https://picsum.photos/300";
        }

        // 📲 LIMPIAR TELÉFONO
        telefono = telefono.toString().replace(/\D/g, "");

        // 🧱 TARJETA
        const card = `
        <div class="card">
            <img src="${imagen}" onerror="this.src='https://picsum.photos/300'">
            <div class="card-content">
                <h3>${nombre}</h3>
                <p>${descripcion}</p>
                <a class="btn" href="https://wa.me/${telefono}" target="_blank">
                    Contactar
                </a>
            </div>
        </div>
        `;

        contenedor.innerHTML += card;
    });
}

// 🔍 BUSCADOR
document.getElementById("buscador").addEventListener("input", e => {
    const texto = e.target.value.toLowerCase();

    const filtrados = datos.filter(item => {
        const nombre = item["Nombre de tu negocio"] || "";
        return nombre.toLowerCase().includes(texto);
    });

    render(filtrados);
});
</script>
