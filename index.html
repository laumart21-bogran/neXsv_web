<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeXsv</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#eef1f6;
  overflow-x:hidden;
}

/* =========================
   HEADER
========================= */

header{
  width:100%;
  background:#f3f6fb;
  position:fixed;
  top:0;
  left:0;
  z-index:9999;
  border-bottom:1px solid rgba(0,0,0,0.05);
}

.top-logo{
  text-align:center;
  padding:18px 20px 8px;
}

.top-logo img{
  width:170px;
  max-width:90%;
  display:block;
  margin:auto;
}

/* NAV */

nav{
  width:100%;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:18px;
  padding:10px 20px 22px;
}

nav a{
  text-decoration:none;
  color:#2155b5;
  font-weight:700;
  font-size:18px;
  transition:0.3s;
}

nav a:hover{
  opacity:0.8;
}

.nav-btn{
  background:#f7cf42;
  color:#1d2d50 !important;
  padding:16px 34px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(247,207,66,0.25);
}

/* =========================
   HERO
========================= */

.hero{
  width:100%;
  min-height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  overflow:hidden;
  padding-top:180px;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
  linear-gradient(rgba(8,30,66,0.74), rgba(8,30,66,0.74)),
  url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?q=80&w=1600&auto=format&fit=crop');

  background-size:cover;
  background-position:center;
}

.hero-content{
  position:relative;
  z-index:2;
  width:100%;
  max-width:1200px;
  margin:auto;
  padding:60px 80px 100px;
}

.hero-logo{
  width:220px;
  display:block;
  margin-bottom:35px;
}

.hero h1{
  color:white;
  font-size:82px;
  line-height:0.95;
  font-weight:800;
  max-width:700px;
  margin-bottom:28px;
}

.hero p{
  color:white;
  font-size:31px;
  line-height:1.6;
  max-width:760px;
  margin-bottom:42px;
}

.hero-buttons{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.hero-buttons a{
  text-decoration:none;
  padding:22px 38px;
  border-radius:22px;
  font-size:24px;
  font-weight:700;
  transition:0.3s;
}

.btn-primary{
  background:#f7cf42;
  color:#16213e;
  box-shadow:0 10px 25px rgba(247,207,66,0.25);
}

.btn-secondary{
  background:rgba(255,255,255,0.10);
  color:white;
  border:2px solid rgba(255,255,255,0.16);
  backdrop-filter:blur(10px);
}

.hero-buttons a:hover{
  transform:translateY(-3px);
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

  header{
    position:relative;
  }

  .top-logo{
    padding:20px 20px 10px;
  }

  .top-logo img{
    width:145px;
  }

  nav{
    gap:14px 22px;
    padding:10px 18px 22px;
  }

  nav a{
    font-size:16px;
  }

  .nav-btn{
    padding:14px 26px;
    border-radius:18px;
    font-size:16px;
  }

  .hero{
    min-height:auto;
    padding-top:0;
  }

  .hero-content{
    padding:70px 28px 80px;
  }

  /* ELIMINÉ LA IMAGEN ROTA */
  .hero-logo{
    display:none;
  }

  .hero h1{
    font-size:58px;
    line-height:0.95;
    max-width:100%;
    margin-bottom:24px;
  }

  .hero p{
    font-size:22px;
    line-height:1.7;
    max-width:100%;
    margin-bottom:36px;
  }

  .hero-buttons{
    width:100%;
    flex-direction:column;
    gap:16px;
  }

  .hero-buttons a{
    width:100%;
    text-align:center;
    font-size:22px;
    padding:20px;
    border-radius:20px;
  }

}

/* =========================
   EXTRA SMALL
========================= */

@media(max-width:480px){

  nav{
    gap:12px 18px;
  }

  nav a{
    font-size:15px;
  }

  .nav-btn{
    width:100%;
    text-align:center;
    margin-top:5px;
  }

  .hero-content{
    padding:60px 22px 70px;
  }

  .hero h1{
    font-size:46px;
  }

  .hero p{
    font-size:18px;
    line-height:1.8;
  }

  .hero-buttons a{
    font-size:20px;
    padding:18px;
  }

}

</style>

</head>

<body>

<!-- HEADER -->

<header>

  <div class="top-logo">
    <img src="logo.png" alt="NeXsv">
  </div>

  <nav>

    <a href="index.html">Inicio</a>

    <a href="como.html">
      Cómo funciona
    </a>

    <a href="beneficios.html">
      Beneficios
    </a>

    <a href="negocios.html">
      Negocios
    </a>

    <a href="blog.html">
      Blog
    </a>

    <a class="nav-btn"
    href="https://docs.google.com/forms/d/e/1FAIpQLSeDIKEEkzAxlmfRmTNLVBQoiiNxrbpbRcqk3C3iL73QCDMhyw/viewform"
    target="_blank">

      Solicitar acceso

    </a>

  </nav>

</header>

<!-- HERO -->

<section class="hero">

  <div class="hero-content">

    <h1>
      Conecta,
      compra y crece
    </h1>

    <p>
      La red privada que conecta negocios y familias
      dentro de una misma comunidad basada en
      confianza, cercanía y afinidad.
    </p>

    <div class="hero-buttons">

      <a href="negocios.html"
      class="btn-primary">

        Explorar negocios

      </a>

      <a href="https://docs.google.com/forms/d/e/1FAIpQLSeDIKEEkzAxlmfRmTNLVBQoiiNxrbpbRcqk3C3iL73QCDMhyw/viewform"
      target="_blank"
      class="btn-secondary">

        Solicitar acceso

      </a>

    </div>

  </div>

</section>

</body>
</html>
