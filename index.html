<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test NeXsv</title>
</head>

<body>

<h1>Prueba de conexión</h1>

<div id="estado">Cargando...</div>
<pre id="debug"></pre>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyrIEZSG8v1nX8q2AUBkcnFDyGq8LyqZ2Wi60uar3w2CVWTdFudxkYkoQ8Tcww_i0Xa/exec";

fetch(URL)
.then(res => res.text()) // 👈 usamos text para ver TODO
.then(text => {
  document.getElementById("estado").innerText = "Respuesta recibida ✅";
  document.getElementById("debug").innerText = text;
})
.catch(err => {
  document.getElementById("estado").innerText = "ERROR ❌";
  document.getElementById("debug").innerText = err;
});
</script>

</body>
</html>
