<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NeXsv</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6fb;
}

/* HEADER */
.header {
  background: linear-gradient(90deg, #2A4B7C, #3b5c94);
  padding: 12px 40px;
  display: flex;
  align-items: center;
}

.header img {
  height: 60px;
}

/* HERO */
.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 60px;
  background: linear-gradient(135deg, #eef2f7, #dfe6f1);
}

.hero h1 {
  font-size: 42px;
  text-transform: lowercase;
}

.hero p {
  color: #555;
}

.hero img {
  width: 380px;
}

.btn {
  margin-top: 20px;
  padding: 12px 20px;
  background: #34A88E;
  color: white;
  border-radius: 10px;
  text-decoration: none;
}

/* GRID */
.grid {
  padding: 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 25px;
}

/* TARJETAS PRO */
.card {
  background: white;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
}

/* IMAGEN */
.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* CONTENIDO */
.card-content {
  padding: 15px;
}

.card h3 {
  margin: 0;
  font-size: 18px;
}

.card p {
  font-size: 14px;
  color: #555;
  margin-top: 6px;
}

/* BOTÓN */
.btn-whatsapp {
  display: inline-block;
  margin-top: 12px;
  padding: 10px 14px;
  background: #25D366;
  color: white;
  border-radius: 10px;
  text-decoration: none;
  font-size: 14px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png">
</div>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>conecta, compra y crece</h1>
    <p>red de negocios entre padres en el salvador</p>
    <a class="btn" href="#">unirme ahora</a>
  </div>

  <img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png">
</div>

<!-- TARJETAS -->
<div class="grid" id="contenedor"></div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzF0bM2tWAxX2lTgBP-6WnkJeV2kohQHPVV4FLubDH5NENFUgFH_Vs7ufepbyJ6NXa4/exec";

fetch(URL)
.then(res => res.json())
.then(data => {

  const contenedor = document.getElementById("contenedor");

  data.forEach(item => {

    const nombre = item["Nombre de tu negocio"] || "negocio";

    const descripcion = item["Describe tu negocio en 1-2 líneas"]
      || item["¿Qué vendes o qué servicio ofreces?"]
      || "sin descripción";

    let whatsapp = item["WhatsApp del negocio"] || "";
    whatsapp = whatsapp.replace(/\D/g, "");

    // 🔥 IMAGEN DESDE GOOGLE DRIVE
    let imagen = item["Link de imagen de tu negocio"] || "";

    if (imagen.includes("drive.google.com")) {
      const id = imagen.split("/d/")[1]?.split("/")[0];
      if (id) {
        imagen = `https://drive.google.com/uc?export=view&id=${id}`;
      }
    }

    const card = `
      <div class="card">

        <img src="${imagen || 'https://via.placeholder.com/400'}">

        <div class="card-content">
          <h3>${nombre}</h3>

          <p>${descripcion}</p>

          <a class="btn-whatsapp" href="https://wa.me/${whatsapp}" target="_blank">
            contactar
          </a>
        </div>

      </div>
    `;

    contenedor.innerHTML += card;

  });

})
.catch(() => {
  document.body.innerHTML += "<p style='color:red'>Error cargando datos</p>";
});

</script>

</body>
</html>
