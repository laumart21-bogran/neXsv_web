<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NeXsv</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fb;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #2A4B7C;
  padding: 15px 30px;
  color: white;
}

.navbar img {
  height: 50px;
}

.navbar a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

.btn-nav {
  background: #34A88E;
  padding: 10px 15px;
  border-radius: 8px;
}

/* HERO */
.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 50px;
  background: linear-gradient(135deg, #eef2f7, #dfe6f1);
}

.hero-text {
  max-width: 500px;
}

.hero h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

.hero p {
  color: #555;
}

.hero img {
  width: 300px;
}

/* BOTÓN */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 20px;
  background: #34A88E;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

/* CONTENIDO */
.container {
  display: flex;
  padding: 30px;
  gap: 30px;
}

/* GRID */
.grid {
  flex: 3;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

/* TARJETAS */
.card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 5px 12px rgba(0,0,0,0.08);
}

.card img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
}

.card h3 {
  margin: 10px 0 5px;
}

.card p {
  font-size: 14px;
  color: #555;
}

.estrellas {
  color: gold;
}

.card a {
  display: inline-block;
  margin-top: 10px;
  padding: 10px;
  background: #25D366;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

/* SIDEBAR */
.sidebar {
  flex: 1;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

.box ul {
  padding-left: 20px;
}

.testimonio {
  text-align: center;
}

.testimonio img {
  width: 80px;
  border-radius: 50%;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <img src="logo.png">
  <div>
    <a href="#">Inicio</a>
    <a href="#">Cómo funciona</a>
    <a href="#">Beneficios</a>
    <a href="#">Negocios</a>
    <a class="btn-nav" href="https://forms.gle/KGV4895NqmrPmi9S8">Unirme ahora</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-text">
    <h1>Conecta, compra y crece</h1>
    <p>Red de negocios para padres de colegios privados en El Salvador</p>
    <a class="btn" href="https://forms.gle/KGV4895NqmrPmi9S8">Unirme ahora</a>
  </div>
  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
</div>

<!-- CONTENIDO -->
<div class="container">

  <div class="grid" id="contenedor"></div>

  <div class="sidebar">

    <div class="box">
      <h3>Beneficios</h3>
      <ul>
        <li>Clientes confiables</li>
        <li>Comunidad privada</li>
        <li>Más ventas</li>
      </ul>
    </div>

    <div class="box testimonio">
      <img src="https://randomuser.me/api/portraits/women/44.jpg">
      <h4>Laura González</h4>
      <p>"Gracias a NeXsv encontré clientes reales"</p>
    </div>

  </div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzF0bM2tWAxX2lTgBP-6WnkJeV2kohQHPVV4FLubDH5NENFUgFH_Vs7ufepbyJ6NXa4/exec";

fetch(URL)
.then(res => res.json())
.then(data => {

  const contenedor = document.getElementById("contenedor");

  data.forEach(item => {

    const nombre = item["  Nombre de tu negocio  "] || "Negocio";
    const desc = item["¿Qué vendes o qué servicio ofreces?"] || "";
    const rating = parseInt(item["Calificación"]) || 0;

    let estrellas = "⭐".repeat(rating);

    let whatsapp = item["WhatsApp del negocio"] || "";
    whatsapp = whatsapp.replace(/\D/g, "");

    const card = `
      <div class="card">
        <img src="https://randomuser.me/api/portraits/men/32.jpg">
        <h3>${nombre}</h3>
        <p>${desc}</p>
        <div class="estrellas">${estrellas}</div>
        <a href="https://wa.me/${whatsapp}" target="_blank">Contactar</a>
      </div>
    `;

    contenedor.innerHTML += card;
  });

});

</script>

</body>
</html>
