<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NeXsv</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>NeXsv</h1>
<p>Marketplace de negocios</p>

<a href="https://forms.gle/KGV4895NqmrPmi9S8" target="_blank">
Registrar negocio
</a>

<div id="contenedor" class="grid"></div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzF0bM2tWAxX2lTgBP-6WnkJeV2kohQHPVV4FLubDH5NENFUgFH_Vs7ufepbyJ6NXa4/exec";

fetch(URL)
.then(res => res.json())
.then(data => {

  const contenedor = document.getElementById("contenedor");

  if (!data || data.length === 0) {
    contenedor.innerHTML = "<p>No hay negocios aún</p>";
    return;
  }

  data.forEach(item => {

    const nombre = item["  Nombre de tu negocio  "] || "Negocio";
    const descripcion = item["¿Qué vendes o qué servicio ofreces?"] || "";
    const whatsapp = item["WhatsApp del negocio"] || "";

    let imagen = item["Link de imagen de tu negocio "] || "";

    // 🔧 FIX IMAGEN GOOGLE DRIVE (SEGURO)
    if (imagen && imagen.includes("drive.google.com")) {
      try {
        const id = imagen.split("/d/")[1].split("/")[0];
        imagen = "https://drive.google.com/uc?export=view&id=" + id;
      } catch (e) {
        imagen = "";
      }
    }

    if (!imagen) {
      imagen = "https://via.placeholder.com/300";
    }

    const card = `
      <div class="card">
        <img src="${imagen}">
        <h3>${nombre}</h3>
        <p>${descripcion}</p>
        <a href="https://wa.me/${whatsapp.replace('+','')}" target="_blank">
          Contactar
        </a>
      </div>
    `;

    contenedor.innerHTML += card;
  });

})
.catch(error => {
  console.error("Error:", error);
  document.getElementById("contenedor").innerHTML = "<p style='color:red'>Error cargando datos</p>";
});

</script>

</body>
</html>
