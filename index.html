<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NeXsv</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6fb;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: linear-gradient(90deg, #2A4B7C, #3b5c94);
  color: white;
}

.menu a {
  margin: 0 10px;
  color: white;
  text-decoration: none;
}

/* HERO */
.hero {
  display: flex;
  justify-content: space-between;
  padding: 60px;
  background: linear-gradient(135deg, #eef2f7, #dfe6f1);
}

.hero h1 {
  font-size: 42px;
  text-transform: lowercase;
}

.hero img {
  width: 380px;
}

/* BOTÓN */
.btn {
  background: #34A88E;
  padding: 12px 18px;
  color: white;
  border-radius: 10px;
  text-decoration: none;
}

/* CONTENEDOR */
.container {
  display: flex;
  padding: 40px;
  gap: 30px;
}

/* GRID */
.grid {
  flex: 3;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

/* CARD */
.card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  display: flex;
  gap: 10px;
}

.card img {
  width: 80px;
  height: 80px;
  border-radius: 10px;
  object-fit: cover;
}

.card h3 {
  margin: 0;
}

.card p {
  font-size: 14px;
  color: #555;
}

/* BOTÓN WHATSAPP */
.btn-wsp {
  background: #25D366;
  color: white;
  padding: 8px 12px;
  border-radius: 8px;
  text-decoration: none;
  display: inline-block;
  margin-top: 5px;
}

/* SIDEBAR */
.sidebar {
  flex: 1;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

.stars {
  color: gold;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>NeXsv</h2>
  <div class="menu">
    <a href="#">Inicio</a>
    <a href="#">Cómo funciona</a>
    <a href="#">Beneficios</a>
    <a href="#">Negocios</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>conecta, compra y crece</h1>
    <p>red de negocios entre padres en el salvador</p>
    <a class="btn" href="#">unirme ahora</a>
  </div>

  <img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png">
</div>

<!-- CONTENIDO -->
<div class="container">

  <div class="grid" id="contenedor"></div>

  <div class="sidebar">

    <div class="box">
      <h3>Beneficios de unirte</h3>
      <p>✔ Clientes confiables</p>
      <p>✔ Comunidad privada</p>
      <p>✔ Más ventas sin publicidad</p>
    </div>

    <div class="box">
      <h3>Testimonio</h3>
      <p>"Gracias a NeXsv aumenté mis ventas"</p>
    </div>

  </div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzF0bM2tWAxX2lTgBP-6WnkJeV2kohQHPVV4FLubDH5NENFUgFH_Vs7ufepbyJ6NXa4/exec";

fetch(URL)
.then(res => res.json())
.then(data => {

  const contenedor = document.getElementById("contenedor");

  data.forEach(item => {

    const nombre = item["Nombre de tu negocio"] || "Negocio";

    const descripcion = item["Describe tu negocio en 1-2 líneas"]
      || item["¿Qué vendes o qué servicio ofreces?"]
      || "sin descripción";

    let whatsapp = item["WhatsApp del negocio"] || "";
    whatsapp = whatsapp.replace(/\D/g, "");

    let imagen = item["Link de imagen de tu negocio"] || "";

    if (imagen.includes("drive.google.com")) {
      const id = imagen.split("/d/")[1]?.split("/")[0];
      imagen = `https://drive.google.com/uc?export=view&id=${id}`;
    }

    const card = `
      <div class="card">

        <img src="${imagen || 'https://via.placeholder.com/80'}">

        <div>
          <h3>${nombre}</h3>

          <p>${descripcion}</p>

          <div class="stars">★★★★★</div>

          <a class="btn-wsp" href="https://wa.me/${whatsapp}" target="_blank">
            contactar
          </a>
        </div>

      </div>
    `;

    contenedor.innerHTML += card;

  });

});

</script>

</body>
</html>
