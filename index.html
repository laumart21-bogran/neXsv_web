<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NeXsv</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f8;
}

/* HEADER */
header {
  background: #2A4B7C;
  color: white;
  padding: 30px 20px;
  text-align: center;
}

.logo {
  height: 100px; /* 🔥 MÁS GRANDE */
  margin-bottom: 10px;
}

/* HERO (COVER) */
.hero {
  background: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f');
  background-size: cover;
  background-position: center;
  height: 250px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.hero h2 {
  background: rgba(0,0,0,0.5);
  padding: 15px 25px;
  border-radius: 10px;
}

/* BOTÓN */
.btn {
  display: inline-block;
  margin: 20px;
  padding: 12px 20px;
  background: #34A88E;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

/* FILTRO */
#filtro {
  padding: 10px;
  border-radius: 8px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
  padding: 30px;
}

/* TARJETA */
.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  transition: transform 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

/* DESTACADO */
.destacado {
  border: 3px solid gold;
  transform: scale(1.03);
}

/* IMAGEN */
.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* TEXTO */
.card h3 {
  margin: 15px;
}

.card p {
  margin: 0 15px 15px;
}

/* BOTÓN WHATSAPP */
.card a {
  display: block;
  margin: 15px;
  padding: 12px;
  background: #25D366;
  color: white;
  border-radius: 8px;
  text-align: center;
  font-weight: bold;
  text-decoration: none;
  transition: 0.2s;
}

.card a:hover {
  background: #1ebe5d;
}
</style>

</head>

<body>

<header>
  <img src="logo.png" alt="NeXsv Logo" class="logo">
  <p>Conecta. Crece. Apoya.</p>
</header>

<!-- 🔥 HERO SECTION -->
<div class="hero">
  <h2>Descubre negocios cerca de ti 🚀</h2>
</div>

<a class="btn" href="https://forms.gle/KGV4895NqmrPmi9S8" target="_blank">
Registrar negocio
</a>

<br>

<select id="filtro">
  <option value="todos">Todas las categorías</option>
</select>

<div id="contenedor" class="grid"></div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzF0bM2tWAxX2lTgBP-6WnkJeV2kohQHPVV4FLubDH5NENFUgFH_Vs7ufepbyJ6NXa4/exec";

let datosGlobales = [];

fetch(URL)
.then(res => res.json())
.then(data => {
  datosGlobales = data;
  cargarCategorias(data);
  render(data);
});

function cargarCategorias(data) {
  const filtro = document.getElementById("filtro");
  let categorias = new Set();

  data.forEach(item => {
    const cat = item["Categoría de tu negocio "] || "Otros";
    categorias.add(cat);
  });

  categorias.forEach(cat => {
    filtro.innerHTML += `<option value="${cat}">${cat}</option>`;
  });

  filtro.addEventListener("change", () => {
    filtrar(filtro.value);
  });
}

function filtrar(categoria) {
  if (categoria === "todos") {
    render(datosGlobales);
  } else {
    const filtrados = datosGlobales.filter(item =>
      item["Categoría de tu negocio "] === categoria
    );
    render(filtrados);
  }
}

function render(data) {
  const contenedor = document.getElementById("contenedor");
  contenedor.innerHTML = "";

  // ⭐ ORDEN PREMIUM
  data.sort((a, b) => (b["Publicado"] === "SI") - (a["Publicado"] === "SI"));

  data.forEach(item => {

    const nombre = item["  Nombre de tu negocio  "] || "Negocio";
    const descripcion = item["¿Qué vendes o qué servicio ofreces?"] || "";

    let whatsapp = item["WhatsApp del negocio"] || "";
    whatsapp = whatsapp.replace(/\D/g, "");

    let imagen = item["Link de imagen de tu negocio "] || "";

    const match = imagen.match(/[-\w]{25,}/);
    if (match) {
      imagen = `https://lh3.googleusercontent.com/d/${match[0]}`;
    }

    if (!imagen) {
      imagen = "https://picsum.photos/300";
    }

    const destacado = item["Publicado"] === "SI";

    const card = `
      <div class="card ${destacado ? 'destacado' : ''}">
        <img src="${imagen}">
        <h3>${nombre}</h3>
        <p>${descripcion}</p>
        <a href="https://wa.me/${whatsapp}" target="_blank">
          Contactar
        </a>
      </div>
    `;

    contenedor.innerHTML += card;
  });
}

</script>

</body>
</html>
