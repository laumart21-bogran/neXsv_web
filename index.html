<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NeXsv</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f8;
}

/* HEADER */
header {
  background: #2A4B7C;
  color: white;
  padding: 20px;
  text-align: center;
}

/* BOTÓN */
.btn {
  display: inline-block;
  margin: 20px;
  padding: 12px 20px;
  background: #34A88E;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
  padding: 30px;
}

/* TARJETA */
.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  transition: transform 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

/* IMAGEN */
.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* CONTENIDO */
.card h3 {
  margin: 15px;
}

.card p {
  margin: 0 15px 15px;
}

/* BOTÓN WHATSAPP */
.card a {
  display: block;
  margin: 15px;
  padding: 10px;
  background: #2A4B7C;
  color: white;
  border-radius: 8px;
  text-align: center;
}
</style>

</head>

<body>

<header>
  <h1>NeXsv</h1>
  <p>Conecta. Crece. Apoya.</p>
</header>

<a class="btn" href="https://forms.gle/KGV4895NqmrPmi9S8" target="_blank">
Registrar negocio
</a>

<div id="contenedor" class="grid"></div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzF0bM2tWAxX2lTgBP-6WnkJeV2kohQHPVV4FLubDH5NENFUgFH_Vs7ufepbyJ6NXa4/exec";

fetch(URL)
.then(res => res.json())
.then(data => {

  const contenedor = document.getElementById("contenedor");

  if (!data || data.length === 0) {
    contenedor.innerHTML = "<p>No hay negocios aún</p>";
    return;
  }

  data.forEach(item => {

    const nombre = item["  Nombre de tu negocio  "] || "Negocio";
    const descripcion = item["¿Qué vendes o qué servicio ofreces?"] || "";
    const whatsapp = item["WhatsApp del negocio"] || "";

    let imagen = item["Link de imagen de tu negocio "] || "";

    // 🔥 FIX GOOGLE DRIVE (DEFINITIVO)
    if (imagen && imagen.includes("drive.google.com")) {
      const match = imagen.match(/[-\w]{25,}/);
      if (match) {
        imagen = `https://drive.google.com/uc?export=view&id=${match[0]}`;
      }
    }

    // fallback imagen
    if (!imagen) {
      imagen = "https://picsum.photos/300";
    }

    const card = `
      <div class="card">
        <img src="${imagen}">
        <h3>${nombre}</h3>
        <p>${descripcion}</p>
        <a href="https://wa.me/${whatsapp.replace('+','')}" target="_blank">
          Contactar
        </a>
      </div>
    `;

    contenedor.innerHTML += card;
  });

})
.catch(error => {
  console.error("Error:", error);
  document.getElementById("contenedor").innerHTML = "<p style='color:red'>Error cargando datos</p>";
});

</script>

</body>
</html>
